const CATS=[{id:'all',label:'All',ic:'🌸'},{id:'us',label:'Us',ic:'💑'},{id:'places',label:'Places',ic:'🌍'},{id:'silly',label:'Silly',ic:'😂'},{id:'nights',label:'Nights',ic:'🌙'},{id:'love',label:'Love',ic:'💕'},{id:'adventures',label:'Adventures',ic:'✨'}];
const CAT_BG={us:'linear-gradient(135deg,#6B1A3A,#C23B6E)',places:'linear-gradient(135deg,#0A3D6B,#1A6BB5)',silly:'linear-gradient(135deg,#4A2800,#B86A00)',nights:'linear-gradient(135deg,#1C0D40,#4A2895)',love:'linear-gradient(135deg,#7B0A3C,#FF4B8B)',adventures:'linear-gradient(135deg,#0A4A3C,#0FB899)'};
const REACTIONS=[{ic:'💕',k:'love'},{ic:'😍',k:'obsessed'},{ic:'🥺',k:'miss'},{ic:'😂',k:'haha'},{ic:'🌹',k:'beautiful'},{ic:'✨',k:'magical'}];

function PhotoModal({photo,photos,idx:initIdx,onClose,onReact,onCap,onFav,onDel}){
  const[idx,setIdx]=useState(initIdx);const[capEdit,setCapEdit]=useState(false);const[capVal,setCapVal]=useState('');const[zoom,setZoom]=useState(false);
  const cur=photos[idx]||photo;
  useEffect(()=>{const h=e=>{if(e.key==='ArrowLeft')setIdx(i=>Math.max(0,i-1));else if(e.key==='ArrowRight')setIdx(i=>Math.min(photos.length-1,i+1));else if(e.key==='Escape'){if(zoom)setZoom(false);else onClose();}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[photos.length,zoom]);
  return(
    <div className="pm">
      <div className="pm-bg" onClick={()=>zoom?setZoom(false):onClose()}/>
      <button className="pm-close" onClick={onClose}>✕</button>
      <div className="pm-img-wrap">
        <img className="pm-img" src={cur.url} alt="" key={cur.id} onClick={()=>setZoom(z=>!z)} style={{maxHeight:zoom?'90vh':'calc(100vh - 260px)',cursor:'zoom-in',transition:'all .3s',transform:zoom?'scale(1.8)':'scale(1)'}}/>
      </div>
      <div className="pm-foot">
        <div className="pm-date">{cur.date} • {cur.category||'Memory'}</div>
        {capEdit?(
          <div style={{marginBottom:11}}>
            <input className="cap-inp" autoFocus value={capVal} onChange={e=>setCapVal(e.target.value)} placeholder="Write something about this moment…" onKeyDown={e=>{if(e.key==='Enter'){onCap(cur.id,capVal);setCapEdit(false);}}}/>
            <div style={{display:'flex',gap:8}}><button className="btn-r" style={{fontSize:12,padding:'6px 13px'}} onClick={()=>{onCap(cur.id,capVal);setCapEdit(false);}}>Save</button><button className="btn-r" style={{fontSize:12,padding:'6px 13px'}} onClick={()=>setCapEdit(false)}>Cancel</button></div>
          </div>
        ):(
          <div className="pm-cap" onClick={()=>{setCapEdit(true);setCapVal(cur.caption||'');}}>
            {cur.caption||<span style={{color:'var(--tdd)',fontSize:13}}>Add a caption… ✎</span>}
          </div>
        )}
        <div className="pm-rxns">{REACTIONS.map(r=>{const n=(cur.reactions||{})[r.k]||0;return <button key={r.k} className={`rxn-btn ${n>0?'active':''}`} onClick={()=>onReact(cur.id,r.k)}>{r.ic}{n>0&&<span style={{fontSize:11,marginLeft:2}}>{n}</span>}</button>;})}</div>
        <div className="pm-nav-row">
          <button className="pm-nb" onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0}>←</button>
          <div style={{flex:1,display:'flex',justifyContent:'center',gap:8}}>
            <button className="pm-nb" onClick={()=>onFav(cur.id)} title={cur.favourite?'Unfavourite':'Favourite'}>{cur.favourite?'🌸':'🤍'}</button>
            <button className="pm-nb" onClick={()=>setZoom(z=>!z)} title="Zoom">{zoom?'🔍':'🔎'}</button>
            <button className="pm-nb" style={{color:'rgba(255,80,80,.7)'}} onClick={()=>{if(window.confirm('Delete?')){onDel(cur.id);onClose();}}}>🗑</button>
          </div>
          <button className="pm-nb" onClick={()=>setIdx(i=>Math.min(photos.length-1,i+1))} disabled={idx===photos.length-1}>→</button>
        </div>
        <div className="pm-pos">{idx+1} / {photos.length}</div>
      </div>
    </div>
  );
}

function Slideshow({photos,onClose}){
  const[idx,setIdx]=useState(0);const[play,setPlay]=useState(true);const tmr=useRef();
  useEffect(()=>{if(play){tmr.current=setInterval(()=>setIdx(i=>(i+1)%photos.length),3500);}return()=>clearInterval(tmr.current);},[play,photos.length]);
  if(!photos.length)return null;const p=photos[idx];
  return(
    <div className="ss">
      <button className="ss-close" onClick={onClose}>✕</button>
      <img src={p.url} alt="" key={p.id}/>
      {p.caption&&<div style={{position:'absolute',bottom:90,left:0,right:0,textAlign:'center',fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic',color:'rgba(255,255,255,.7)',padding:'0 40px'}}>"{p.caption}"</div>}
      <div style={{position:'absolute',bottom:90,left:0,right:0,textAlign:'center',fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic',color:'rgba(255,255,255,.7)',padding:'0 40px'}}>{p.caption&&`"${p.caption}"`}</div>
      <div className="ss-ctrl">
        <button className="ss-btn" onClick={()=>setIdx(i=>Math.max(0,i-1))}>←</button>
        <button className="ss-btn" style={{width:56,height:56,fontSize:16,background:'rgba(255,75,139,.25)'}} onClick={()=>setPlay(p=>!p)}>{play?'⏸':'▶'}</button>
        <button className="ss-btn" onClick={()=>setIdx(i=>(i+1)%photos.length)}>→</button>
      </div>
    </div>
  );
}

function VaultScreen(){
  const hasPV=!!localStorage.getItem(KEYS.pv);const hasSV=!!sessionStorage.getItem(KEYS.sv);
  const[locked,setLocked]=useState(hasPV&&!hasSV);const[isNew,setIsNew]=useState(!hasPV);
  const[photos,setPhotos]=useState([]);const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState('all');const[search,setSearch]=useState('');
  const[active,setActive]=useState(null);const[actIdx,setActIdx]=useState(0);
  const[slide,setSlide]=useState(false);const[hearts,setHearts]=useState([]);const[drag,setDrag]=useState(false);
  const[selectMode,setSelectMode]=useState(false);const[selected,setSelected]=useState(new Set());
  const[sortBy,setSortBy]=useState('newest');
  const fileRef=useRef();

  useEffect(()=>{if(!locked)load();},[locked]);
  async function load(){setLoading(true);try{const all=await dbAll();setPhotos(all);}catch(e){}setLoading(false);}

  const filtered=useMemo(()=>{
    let r=[...photos];
    if(filter==='fav')r=r.filter(p=>p.favourite);
    else if(filter!=='all')r=r.filter(p=>p.category===filter);
    if(search)r=r.filter(p=>(p.caption||'').toLowerCase().includes(search.toLowerCase())||(p.category||'').toLowerCase().includes(search.toLowerCase()));
    if(sortBy==='newest')r.sort((a,b)=>new Date(b.addedAt)-new Date(a.addedAt));
    else if(sortBy==='oldest')r.sort((a,b)=>new Date(a.addedAt)-new Date(b.addedAt));
    else if(sortBy==='fav')r.sort((a,b)=>(b.favourite?1:0)-(a.favourite?1:0));
    return r;
  },[photos,filter,search,sortBy]);

  const cats=useMemo(()=>{const c={};photos.forEach(p=>{c[p.category||'us']=(c[p.category||'us']||0)+1;});return c;},[photos]);

  async function addFiles(files){
    for(const f of Array.from(files)){
      if(!f.type.startsWith('image/'))continue;
      const url=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});
      const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
      await dbAdd({url,caption:'',category:'us',date:today,addedAt:new Date().toISOString(),favourite:false,reactions:{},isNew:true,tags:[]});
    }
    load();
  }

  async function upd(id,ch){const p=photos.find(x=>x.id===id);if(!p)return;const u={...p,...ch};await dbPut(u);setPhotos(prev=>prev.map(x=>x.id===id?u:x));}
  async function handleReact(id,k){const p=photos.find(x=>x.id===id);if(!p)return;const r={...(p.reactions||{})};r[k]=(r[k]||0)+1;upd(id,{reactions:r});}
  async function handleDel(id){await dbDel(id);setPhotos(prev=>prev.filter(x=>x.id!==id));}
  async function bulkDelete(){if(!window.confirm(`Delete ${selected.size} photos?`))return;for(const id of selected)await dbDel(id);setPhotos(prev=>prev.filter(x=>!selected.has(x.id)));setSelected(new Set());setSelectMode(false);}
  function openPhoto(p){const i=filtered.findIndex(x=>x.id===p.id);setActIdx(i>=0?i:0);setActive(p);}
  function spawnHeart(e){const id=Date.now();setHearts(h=>[...h,{id,x:e.clientX,y:e.clientY}]);}
  function toggleSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}

  if(locked)return(
    <div className="vault-page" style={{position:'relative'}}>
      <PinScreen storageKey={KEYS.pv} sessionKey={KEYS.sv} isNew={isNew} onUnlock={()=>{setLocked(false);setIsNew(false);}}/>
    </div>
  );

  return(
    <div className="vault-page" onClick={spawnHeart} style={{position:'relative'}}>
      {hearts.map(h=><HeartPop key={h.id} x={h.x} y={h.y} done={()=>setHearts(p=>p.filter(x=>x.id!==h.id))}/>)}
      {slide&&<Slideshow photos={filtered} onClose={()=>setSlide(false)}/>}
      {active&&<PhotoModal photo={active} photos={filtered} idx={actIdx} onClose={()=>setActive(null)} onReact={handleReact} onCap={(id,c)=>upd(id,{caption:c})} onFav={id=>upd(id,{favourite:!photos.find(x=>x.id===id)?.favourite})} onDel={handleDel}/>}
      <input ref={fileRef} type="file" multiple accept="image/*" style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>

      <div className="vault-hdr">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:300,fontStyle:'italic'}}>Our Photos 📸</div>
            <div style={{fontSize:11,color:'var(--tdd)',fontStyle:'italic',marginTop:1}}>{photos.length} memories — forever yours 💕</div>
          </div>
          <div style={{display:'flex',gap:14}}>
            <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:500,color:'var(--rose)'}}>{photos.length}</div><div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px'}}>photos</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:500,color:'var(--rose)'}}>{photos.filter(p=>p.favourite).length}</div><div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px'}}>favs</div></div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input className="vault-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search captions…"/>
          <select className="vf on" style={{padding:'5px 10px',cursor:'pointer'}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="newest">Newest</option><option value="oldest">Oldest</option><option value="fav">Favourites</option>
          </select>
        </div>
        <div className="vault-filters">
          {CATS.map(c=><button key={c.id} className={`vf ${filter===c.id?'on':''}`} onClick={()=>setFilter(c.id)}>{c.ic} {c.label}</button>)}
          <button className={`vf ${filter==='fav'?'on':''}`} onClick={()=>setFilter('fav')}>🌸 Favs</button>
        </div>
      </div>

      <div className="vault-acts">
        <button className="vact sp" onClick={()=>fileRef.current&&fileRef.current.click()}>➕ Add</button>
        <button className="vact" onClick={()=>setSlide(true)} disabled={!filtered.length}>▶ Slideshow</button>
        <button className="vact" onClick={()=>{if(filtered.length){const r=Math.floor(Math.random()*filtered.length);setActIdx(r);setActive(filtered[r]);}}}>🎲 Random</button>
        <button className={`vact ${selectMode?'sp':''}`} onClick={()=>{setSelectMode(s=>!s);setSelected(new Set());}}>☑ Select</button>
        <button className="vact" onClick={()=>{sessionStorage.removeItem(KEYS.sv);setLocked(true);}}>🔒 Lock</button>
      </div>

      {selectMode&&selected.size>0&&(
        <div className="bulk-bar">
          <span style={{fontSize:13,color:'var(--td)'}}>{selected.size} selected</span>
          <button className="btn-r" style={{fontSize:12,padding:'6px 13px'}} onClick={()=>{photos.filter(p=>selected.has(p.id)).forEach(p=>upd(p.id,{favourite:true}));setSelected(new Set());setSelectMode(false);}}>🌸 Favourite All</button>
          <button onClick={bulkDelete} style={{background:'rgba(255,80,80,.1)',border:'.5px solid rgba(255,80,80,.25)',color:'rgba(255,100,100,.8)',padding:'6px 13px',borderRadius:22,fontSize:12,cursor:'pointer',fontFamily:'var(--sans)'}}>🗑 Delete</button>
        </div>
      )}

      <div className="vault-grid-wrap" onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files);}}>
        {loading&&<div className="loader"><div className="spin-ic"/><span>Loading memories…</span></div>}
        {!loading&&filtered.length===0&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'50px 20px',gap:14}}>
            <div className={`drop-zone ${drag?'drag':''}`} onClick={()=>fileRef.current&&fileRef.current.click()}>
              <div style={{fontSize:42,marginBottom:12,animation:'float 3s ease-in-out infinite'}}>📸</div>
              <div style={{fontFamily:'var(--serif)',fontSize:19,fontStyle:'italic',color:'var(--td)',marginBottom:6}}>Add your photos here</div>
              <div style={{fontSize:13,color:'var(--tdd)',lineHeight:1.6}}>Drop or click to select • 500+ photos supported<br/><strong style={{color:'var(--rose)'}}>Stored securely on your device only 🔒</strong></div>
            </div>
            {search&&<div style={{fontSize:13,color:'var(--tdd)',fontStyle:'italic'}}>No photos matching "{search}"</div>}
          </div>
        )}
        {!loading&&filtered.length>0&&(
          <>
            {filter==='all'&&!search&&Object.keys(cats).length>0&&(
              <>
                <div className="month-div">By Category</div>
                <div className="cat-grid">
                  {Object.entries(cats).slice(0,6).map(([cat,count])=>(
                    <div key={cat} className="cat-card" onClick={()=>setFilter(cat)}>
                      <div className="cat-bg" style={{background:CAT_BG[cat]||'linear-gradient(135deg,#2D1040,#6B1A3A)'}}>{CATS.find(c=>c.id===cat)?.ic||'🌸'}</div>
                      <div className="cat-ov"><div style={{fontSize:12,fontWeight:500,color:'#fff'}}>{CATS.find(c=>c.id===cat)?.label||cat}</div><div style={{fontSize:10,color:'rgba(255,255,255,.6)'}}>{count} photos</div></div>
                    </div>
                  ))}
                </div>
                <div className="month-div">All Memories</div>
              </>
            )}
            <div className="vault-grid">
              {filtered.map(p=><LazyPhoto key={p.id} photo={p} onClick={openPhoto} selectMode={selectMode} selected={selected.has(p.id)} onSelect={toggleSelect}/>)}
            </div>
            <div onClick={()=>fileRef.current&&fileRef.current.click()} style={{margin:'12px 0',border:'1.5px dashed rgba(255,75,139,.2)',borderRadius:13,padding:'16px',textAlign:'center',cursor:'pointer',transition:'border-color .2s'}} onMouseOver={e=>e.currentTarget.style.borderColor='rgba(255,75,139,.4)'} onMouseOut={e=>e.currentTarget.style.borderColor='rgba(255,75,139,.2)'}>
              <div style={{fontSize:18,marginBottom:3}}>➕</div><div style={{fontSize:12,color:'var(--tdd)',fontStyle:'italic'}}>Add more photos</div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function NightScreen(){
  const {cfg}=useCfg();

  const nm=(cfg&&cfg.nightMsgs)||[];
  const h=new Date().getHours();
  const is3am=h>=2&&h<4;

  function startBreathe(){
    if(breatheActive)return;setBreatheActive(true);
    const phases=['Breathe in…','Hold…','Breathe out…','Rest…'];
    const durs=[4000,2000,6000,2000];
    let i=0;
    function next(){setBreathePhase(phases[i]);i=(i+1)%phases.length;setTimeout(next,durs[i]);}

  return(
    <div className="page" style={{position:'relative',overflow:'hidden'}}>

          )}

        <div className="gc" style={{padding:'18px 20px',marginBottom:14,textAlign:'center'}}>
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'2px',color:'var(--tdd)',marginBottom:10}}>Breathing Exercise</div>

function LettersScreen(){
  const{cfg,setCfg}=useCfg();
  const[allLetters,setAllLetters]=useState(()=>ls.get('hpr_letters_v2')||[]);
  const[tab,setTab]=useState('all');
  const[open,setOpen]=useState(null);
  const[writing,setWriting]=useState(false);
  const[draftTitle,setDraftTitle]=useState('');
  const[draftTxt,setDraftTxt]=useState('');
  const[draftFrom,setDraftFrom]=useState('him');
  const[saved,setSaved]=useState(false);

  function saveLetters(l){setAllLetters(l);ls.set('hpr_letters_v2',l);}

  function submitLetter(){
    if(!draftTitle||!draftTxt)return;
    const letter={
      id:Date.now(),
      title:draftTitle,
      content:draftTxt,
      from:draftFrom,
      date:new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
      locked:false,
      ts:new Date().toISOString()
    };
    saveLetters([letter,...allLetters]);
    setDraftTitle('');setDraftTxt('');setWriting(false);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  const filtered=tab==='all'?allLetters:allLetters.filter(l=>l.from===tab);

  if(open){
    return(
      <div className="page" style={{maxWidth:560,paddingBottom:60}}>
        <button onClick={()=>setOpen(null)} style={{background:'none',border:'none',color:'var(--td)',cursor:'pointer',fontSize:13,marginBottom:20,display:'flex',alignItems:'center',gap:6,fontFamily:'var(--sans)',padding:0}}>← Back</button>
        <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.06),rgba(244,161,22,.04))',border:'.5px solid rgba(255,75,139,.15)',borderRadius:20,padding:'28px 22px'}}>
          <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'2px',color:open.from==='her'?'#3DD68C':'var(--rose)',marginBottom:8}}>
            {open.from==='her'?'💌 From Her':'💌 From Him'} · {open.date}
          </div>
          <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)',marginBottom:20}}>{open.title}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:16,color:'var(--td)',lineHeight:2,whiteSpace:'pre-wrap'}}>{open.content}</div>

function WeeklyScreen(){
  const {cfg}=useCfg();
  const questions=(cfg&&cfg.questions)||[];
  const weekKey=`week_${new Date().toISOString().slice(0,10)}`;
  const[answers,setAnswers]=useState(()=>{const s=ls.get(KEYS.weekly)||{};return s[weekKey]||questions.map(()=>'');});
  const[active,setActive]=useState(null);
  const now=new Date();const end=new Date(now.getTime()+7*86400000);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'long',day:'numeric'});
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=now.getDay();const doneCount=answers.filter(a=>a.trim()).length;

  function saveAns(newAns){setAnswers(newAns);const s=ls.get(KEYS.weekly)||{};s[weekKey]=newAns;ls.set(KEYS.weekly,s);}

  return(
    <div className="page" style={{maxWidth:580}}>
      <div className="pg-t">Weekly Truth 📅</div>
      <div style={{fontSize:10,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'2px',marginBottom:16}}>Week of {fmt(now)} – {fmt(end)}</div>

      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:12,color:'var(--td)'}}>Weekly streak</div>
          <div style={{fontSize:11,color:'var(--rose)'}}>{doneCount}/{questions.length} answered</div>
        </div>
        <div className="week-streak">
          {days.map((d,i)=><div key={d} className={`ws-day ${i<today?'done':''}`}>{i===today-1?'🌸':d[0]}</div>)}
        </div>
      </div>

      {questions.map((q,i)=>(
        <div key={i}>
          <div className="q-card" onClick={()=>setActive(active===i?null:i)}>
            <span style={{fontSize:18,flexShrink:0,marginTop:2}}>{q.em}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:14,lineHeight:1.5}}>{q.q}</div>
              <div style={{fontSize:12,color:'var(--tdd)',marginTop:3,fontStyle:'italic'}}>{answers[i]||'Your answer…'}</div>
            </div>
            <span style={{color:'var(--tdd)',marginLeft:'auto',fontSize:12}}>{answers[i]?'✓':active===i?'↑':'›'}</span>
          </div>
          {active===i&&(
            <div style={{padding:'0 4px 10px'}}>
              <textarea style={{width:'100%',background:'rgba(255,255,255,.04)',border:'.5px solid rgba(255,75,139,.25)',borderRadius:11,padding:'11px 13px',fontSize:14,color:'var(--text)',fontFamily:'var(--serif)',fontStyle:'italic',outline:'none',resize:'vertical',minHeight:75,lineHeight:1.65}} placeholder="Write from the heart…" value={answers[i]} onChange={e=>{const a=[...answers];a[i]=e.target.value;saveAns(a);}}/>
            </div>
          )}
        </div>
      ))}
      <button style={{width:'100%',padding:13,background:'linear-gradient(135deg,rgba(168,45,94,.27),rgba(255,75,139,.27))',border:'.5px solid rgba(255,75,139,.38)',borderRadius:14,color:'var(--rose)',fontSize:15,cursor:'pointer',fontFamily:'var(--serif)',fontStyle:'italic',marginTop:16,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>Answer from the heart ♥</button>
    </div>
  );
}

function JourneyScreen(){
  const {cfg}=useCfg();
  const rose=(cfg&&cfg.theme&&THEMES[cfg.theme])?THEMES[cfg.theme].rose:'#FF4B8B';
  const annDate=(cfg&&cfg.anniversaryDate)||'2024-01-20';
  const totalDays=daysTogether(annDate);
  const[items,setItems]=useState(loadJrn);
  const[adding,setAdding]=useState(false);const[editId,setEditId]=useState(null);const[delId,setDelId]=useState(null);const[viewId,setViewId]=useState(null);const[sortAsc,setSortAsc]=useState(true);
  const[form,setForm]=useState({date:'',txt:'',emoji:'✨',color:rose,note:''});
  const JRN_EMOJIS=['✨','💕','🌙','🌹','😂','☕','🎵','💌','🌅','🥺','🎉','🌸','💫','🔥','🫶'];
  const JRN_COLORS=['#FF4B8B','#F4A116','#00B4D8','#A855F7','#22C55E','#FF6B6B'];
  const sorted=useMemo(()=>[...items].sort((a,b)=>{const da=a.date==='Today'?new Date():new Date(a.date);const db2=b.date==='Today'?new Date():new Date(b.date);return sortAsc?da-db2:db2-da;}),[items,sortAsc]);
  function save(list){setItems(list);saveJrn(list);}
  function startAdd(){setForm({date:new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),txt:'',emoji:'✨',color:rose,note:''});setAdding(true);setEditId(null);}
  function startEdit(item){setForm({date:item.date,txt:item.txt,emoji:item.emoji||'✨',color:item.color||rose,note:item.note||''});setEditId(item.id);setAdding(false);}
  function commit(){if(!form.txt.trim())return;if(adding){save([...items,{id:Date.now(),...form}]);setAdding(false);}else{save(items.map(x=>x.id===editId?{...x,...form}:x));setEditId(null);}}
  function del(id){save(items.filter(x=>x.id!==id));setDelId(null);setViewId(null);}
  const showForm=adding||editId!==null;

  const getMilestone=(item)=>{const d=daysAgo(item.date);if(d>=365)return'🎊 1 Year!';if(d>=180)return'⭐ 6 Months';if(d>=100)return'💯 100 Days';if(d>=30)return'🌙 1 Month';return null;};

  if(viewId){
    const item=items.find(x=>x.id===viewId);if(!item){setViewId(null);return null;}
    const da=daysAgo(item.date);const ms=getMilestone(item);
    return(
      <div className="page" style={{animation:'fadeUp .35s ease'}}>
        <button onClick={()=>setViewId(null)} style={{background:'none',border:'none',color:'var(--td)',cursor:'pointer',fontSize:14,marginBottom:20,display:'flex',alignItems:'center',gap:6,fontFamily:'var(--sans)',padding:0}}>← Our Journey</button>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{fontSize:60,marginBottom:10,filter:`drop-shadow(0 0 16px ${item.color}90)`}}>{item.emoji||'✨'}</div>
          <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'2.5px',color:item.color,marginBottom:8}}>{item.date}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:300,lineHeight:1.3,marginBottom:6}}>{item.txt}</div>
          {da>0&&<div style={{fontSize:11,color:'var(--tdd)',fontStyle:'italic'}}>{da} days ago</div>}
          {ms&&<div className="milestone-badge" style={{margin:'10px auto 0',width:'fit-content'}}>{ms}</div>}
        </div>
        {item.note&&<div style={{background:'rgba(255,255,255,.04)',border:`.5px solid ${item.color}40`,borderRadius:13,padding:'16px 18px',marginBottom:16,fontFamily:'var(--serif)',fontSize:15,fontStyle:'italic',color:'var(--td)',lineHeight:1.75}}>"{item.note}"</div>}
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button className="btn-r" onClick={()=>{startEdit(item);setViewId(null);}}>✎ Edit</button>
          <button onClick={()=>setDelId(item.id)} style={{background:'rgba(255,80,80,.1)',border:'.5px solid rgba(255,80,80,.25)',color:'rgba(255,100,100,.8)',padding:'9px 18px',borderRadius:24,fontSize:13,cursor:'pointer',fontFamily:'var(--sans)'}}>🗑 Delete</button>
        </div>
        {delId===item.id&&<div style={{marginTop:14,background:'rgba(255,80,80,.08)',border:'.5px solid rgba(255,80,80,.2)',borderRadius:11,padding:'13px 17px',textAlign:'center'}}><div style={{fontSize:13,color:'var(--td)',marginBottom:11}}>Delete this memory forever?</div><div style={{display:'flex',gap:10,justifyContent:'center'}}><button onClick={()=>del(item.id)} style={{background:'rgba(255,80,80,.25)',border:'none',color:'#ff6464',padding:'8px 18px',borderRadius:22,fontSize:13,cursor:'pointer',fontFamily:'var(--sans)'}}>Yes</button><button onClick={()=>setDelId(null)} className="btn-r">Keep it</button></div></div>}
      </div>
    );
  }

  return(
    <div className="page">
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
        <div><div className="pg-t">Our Journey 🧭</div><div className="pg-s" style={{marginBottom:0}}>The story of us — add, edit, relive every moment.</div></div>
        <div style={{display:'flex',gap:7,flexShrink:0,marginTop:4}}>
          <button onClick={()=>setSortAsc(s=>!s)} style={{background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:20,padding:'6px 11px',fontSize:11,color:'var(--td)',cursor:'pointer',fontFamily:'var(--sans)'}}>{sortAsc?'↑ Old':'↓ New'}</button>
          <button onClick={startAdd} style={{background:'linear-gradient(135deg,#A82D5E,var(--rose))',border:'none',borderRadius:20,padding:'6px 14px',fontSize:12,color:'#fff',cursor:'pointer',fontFamily:'var(--sans)',fontWeight:500}}>＋ Add</button>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--tdd)',marginBottom:16}}>{items.length} memories • {totalDays} days together 💕</div>

      {/* JOURNEY STATS */}
      <div className="jrn-stats" style={{marginBottom:20}}>
        {[{n:items.length,l:'Memories',ic:'📖'},{n:totalDays,l:'Days',ic:'💕'},{n:Math.ceil(totalDays/30),l:'Months',ic:'🌙'}].map(s=>(
          <div key={s.l} className="jstat">
            <div style={{fontSize:18,marginBottom:2}}>{s.ic}</div>
            <div style={{fontSize:18,fontWeight:500,color:'var(--rose)'}}>{s.n}</div>
            <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.2px'}}>{s.l}</div>
          </div>
        ))}
      </div>

      {showForm&&(
        <div style={{background:'rgba(255,75,139,.06)',border:'.5px solid rgba(255,75,139,.28)',borderRadius:15,padding:18,marginBottom:22,animation:'fadeUp .3s ease'}}>
          <div style={{fontSize:12,fontWeight:500,color:'var(--rose)',marginBottom:13,textTransform:'uppercase',letterSpacing:'1.5px'}}>{adding?'✦ New Memory':'✎ Edit Memory'}</div>
          {[['Date','date','e.g. February 14, 2024'],['Memory','txt','What happened?']].map(([lbl,k,ph])=>(
            <div key={k} style={{marginBottom:10}}>
              <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>{lbl}</div>
              <input className="fld-inp" value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph}/>
            </div>
          ))}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:4}}>Note (optional)</div>
            <textarea className="fld-inp" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Write something about this moment…" rows={2}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:7}}>Icon</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>{JRN_EMOJIS.map(em=><button key={em} onClick={()=>setForm(f=>({...f,emoji:em}))} style={{width:34,height:34,borderRadius:9,border:`.5px solid ${form.emoji===em?'rgba(255,75,139,.6)':'var(--gb)'}`,background:form.emoji===em?'rgba(255,75,139,.15)':'var(--glass)',fontSize:17,cursor:'pointer',transform:form.emoji===em?'scale(1.15)':'scale(1)'}}>{em}</button>)}</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:7}}>Color</div>
            <div style={{display:'flex',gap:9}}>{JRN_COLORS.map(c=><div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:26,height:26,borderRadius:'50%',background:c,border:`2.5px solid ${form.color===c?'#fff':'transparent'}`,cursor:'pointer',boxShadow:form.color===c?`0 0 10px ${c}80`:'none',transition:'all .15s'}}/>)}</div>
          </div>
          <div style={{display:'flex',gap:9}}>
            <button onClick={commit} style={{background:'linear-gradient(135deg,#A82D5E,var(--rose))',border:'none',borderRadius:11,padding:'10px 20px',color:'#fff',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',fontWeight:500}}>{adding?'Save ♥':'Update ♥'}</button>
            <button onClick={()=>{setAdding(false);setEditId(null);}} className="btn-r" style={{fontSize:12,padding:'10px 13px'}}>Cancel</button>
          </div>
        </div>
      )}

      {items.length===0&&<div style={{textAlign:'center',padding:'50px 20px',color:'var(--tdd)',fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic'}}><div style={{fontSize:44,marginBottom:14}}>💕</div>Add your first memory together</div>}

      <div className="tl">
        {sorted.map(item=>{

            <div key={item.id} className="tl-item" style={{cursor:'pointer'}} onClick={()=>{if(!showForm)setViewId(item.id);}}>
              <div className="tl-dot" style={{background:item.color||rose,boxShadow:`0 0 9px ${(item.color||rose)}70`}}/>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:9}}>
                <div style={{flex:1}}>
                  <div className="tl-date" style={{color:item.color||rose}}>{item.date}</div>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    {item.emoji&&<span style={{fontSize:17}}>{item.emoji}</span>}
                    <div className="tl-txt">{item.txt}</div>
                  </div>
                  {ms&&<div className="milestone-badge">{ms}</div>}
                  {item.note&&<div style={{fontSize:11,color:'var(--tdd)',fontStyle:'italic',marginTop:4,lineHeight:1.5,fontFamily:'var(--serif)'}}>"{item.note.slice(0,80)}{item.note.length>80?'…':''}"</div>}
                </div>
                {!showForm&&(
                  <div style={{display:'flex',gap:5,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>startEdit(item)} style={{background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:7,padding:'5px 8px',fontSize:11,color:'var(--td)',cursor:'pointer',fontFamily:'var(--sans)'}}>✎</button>
                    <button onClick={()=>setDelId(delId===item.id?null:item.id)} style={{background:'rgba(255,80,80,.08)',border:'.5px solid rgba(255,80,80,.18)',borderRadius:7,padding:'5px 8px',fontSize:11,color:'rgba(255,100,100,.7)',cursor:'pointer'}}>🗑</button>
                  </div>
                )}
              </div>
              {delId===item.id&&(
                <div style={{marginTop:8,background:'rgba(255,80,80,.07)',border:'.5px solid rgba(255,80,80,.18)',borderRadius:9,padding:'9px 13px',display:'flex',alignItems:'center',gap:9}} onClick={e=>e.stopPropagation()}>
                  <span style={{fontSize:12,color:'var(--td)',flex:1}}>Delete this memory?</span>
                  <button onClick={()=>del(item.id)} style={{background:'rgba(255,80,80,.25)',border:'none',color:'#ff6464',padding:'5px 13px',borderRadius:18,fontSize:12,cursor:'pointer',fontFamily:'var(--sans)'}}>Yes</button>
                  <button onClick={()=>setDelId(null)} style={{background:'none',border:'.5px solid var(--gb)',color:'var(--td)',padding:'5px 13px',borderRadius:18,fontSize:12,cursor:'pointer',fontFamily:'var(--sans)'}}>No</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {items.length>0&&<div style={{textAlign:'center',marginTop:14}}><button onClick={startAdd} style={{background:'rgba(255,75,139,.1)',border:'.5px solid rgba(255,75,139,.25)',borderRadius:22,padding:'9px 20px',color:'var(--rose)',fontSize:13,cursor:'pointer',fontFamily:'var(--serif)',fontStyle:'italic'}}>＋ Add another memory</button></div>}
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN: ADMIN
══════════════════════════════════════ */
function AdminScreen(){
  const {cfg,setCfg}=useCfg();
  const[locked,setLocked]=useState(false);const[isNew,setIsNew]=useState(false);
  useEffect(()=>{window._isAdmin=true;},[]);
  const[open,setOpen]=useState({});
  const[draft,setDraft]=useState(()=>({...DEF_CFG,...JSON.parse(JSON.stringify(cfg))}));
  const[saved,setSaved]=useState(false);
  const tog=k=>setOpen(o=>({...o,[k]:!o[k]}));
  function setD(path,val){setDraft(d=>{const n=JSON.parse(JSON.stringify(d));const parts=path.split('.');let cur=n;for(let i=0;i<parts.length-1;i++){if(!cur[parts[i]])cur[parts[i]]={};cur=cur[parts[i]];}cur[parts[parts.length-1]]=val;return n;});}
  function saveAll(){saveCfg(draft);setCfg({...draft});applyTheme(draft.theme||'night');setSaved(true);setTimeout(()=>setSaved(false),2200);}
  function resetAll(){if(!window.confirm('Reset all settings?'))return;saveCfg(DEF_CFG);setCfg({...DEF_CFG});setDraft(JSON.parse(JSON.stringify(DEF_CFG)));applyTheme(DEF_CFG.theme);}

  const inputStyle={width:'100%',background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none',lineHeight:1.6};
  // Use renderFI as a plain function (not a component) to avoid remount on every keystroke
  function renderFI(path,ph,rows,type='text'){
    const val=path.split('.').reduce((o,k)=>o!=null?o[k]:undefined,draft);
    return rows
      ?<textarea key={path} value={val||''} onChange={e=>setD(path,e.target.value)} placeholder={ph} rows={rows} style={{...inputStyle,resize:'vertical'}}/>
      :<input key={path} type={type} value={val||''} onChange={e=>setD(path,e.target.value)} placeholder={ph} style={inputStyle}/>;
  }
  function renderFL(c){return <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.8px',color:'var(--tdd)',marginBottom:5,marginTop:12}}>{c}</div>;}
  const SH=({id,ic,lbl})=><div className="sec-hdr" onClick={()=>tog(id)}><span style={{fontSize:17}}>{ic}</span><span style={{fontSize:13,fontWeight:500,flex:1}}>{lbl}</span><span style={{color:'var(--tdd)',display:'inline-block',transform:open[id]?'rotate(90deg)':'rotate(0deg)',transition:'transform .2s'}}>›</span></div>;
  const SB=({id,ch})=>open[id]?<div className="sec-body">{ch}</div>:null;

  if(locked)return(
    <div className="page" style={{position:'relative',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <PinScreen storageKey={KEYS.pa} sessionKey={KEYS.sa} isNew={isNew} onUnlock={()=>{setLocked(false);setIsNew(false);}}/>
    </div>
  );

  return(
    <div className="page">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div><div className="pg-t">Admin Panel 🛠</div><div className="pg-s" style={{marginBottom:0}}>Modify everything — your universe, your rules.</div></div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
          {saved&&<span style={{fontSize:12,color:'#3DD68C',animation:'fadeUp .3s ease'}}>✓ Saved!</span>}
          <button onClick={saveAll} style={{background:'linear-gradient(135deg,#A82D5E,var(--rose))',border:'none',borderRadius:12,padding:'9px 18px',color:'#fff',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',fontWeight:500}}>Save ♥</button>
        </div>
      </div>
      <div style={{fontSize:11,color:'rgba(255,75,139,.6)',marginBottom:18,fontStyle:'italic'}}>💡 Click "Save" after any change to apply everywhere.</div>

      <SH id="theme" ic="🎨" lbl="Theme & Colors"/>
      <SB id="theme" ch={<>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginTop:8}}>
          {Object.entries(THEMES).map(([id,t])=>(
            <div key={id} onClick={()=>{setD('theme',id);applyTheme(id);}} style={{padding:'10px 8px',borderRadius:11,cursor:'pointer',textAlign:'center',border:`.5px solid ${draft.theme===id?t.rose:'var(--gb)'}`,background:draft.theme===id?t.rose+'18':'var(--glass)',transition:'all .18s'}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:t.rose,margin:'0 auto 6px',boxShadow:draft.theme===id?`0 0 10px ${t.rose}80`:'none'}}/>
              <div style={{fontSize:10,color:draft.theme===id?t.rose:'var(--td)'}}>{t.name}</div>
            </div>
          ))}
        </div>
      </>}/>

      <SH id="identity" ic="🏠" lbl="Identity & Names"/>
      <SB id="identity" ch={<>
        {renderFL('His Name')}{renderFI('hisName','Kenza')}
        {renderFL('Her Name (displayed in greetings)')}{renderFI('herName','Mon Amour')}
        {renderFL('Couple Nickname')}{renderFI('coupleNickname','Nous')}
        {renderFL('App Title (use \n for new line)')}{renderFI('appTitle','Kenza\nPrivate Reality',2,'text')}
        {renderFL('App Tagline')}{renderFI('appTagline','A private universe…',2,'text')}
        {renderFL('His AI Tagline')}{renderFI('aiTagline','I am always here…',2,'text')}
        {renderFL('Love Text (bottom)')}{renderFI('loveText','I love you')}
        {renderFL('Anniversary Date (YYYY-MM-DD)')}{renderFI('anniversaryDate','2024-01-20',undefined,'date')}
      </>}/>

      <SH id="home" ic="🌅" lbl="Home Screen"/>
      <SB id="home" ch={<>
        {renderFL('Subtitle')}{renderFI('homeSubtitle','I missed you today…')}
        {renderFL('Connection % (1–100)')}
        <input type="range" min={1} max={100} value={draft.connPct||84} onChange={e=>setD('connPct',Number(e.target.value))} style={{width:'100%',accentColor:'var(--rose)',marginBottom:4}}/>
        <div style={{fontSize:12,color:'var(--rose)',textAlign:'center',marginBottom:8}}>{draft.connPct||84}%</div>
        {renderFL('Connection Label')}{renderFI('connLabel','Growing beautifully ♥')}
        {renderFL('Love Quote (shown on home)')}{renderFI('loveQuote','The best thing to hold onto…',2,'text')}
        {renderFL('Quote Author')}{renderFI('loveQuoteAuthor','Audrey Hepburn')}
        {renderFL('Greetings by Time of Day')}

          <div key={p} style={{marginBottom:7}}><div style={{fontSize:10,color:'var(--tdd)',marginBottom:3}}>{lbl}</div>{renderFI('','Good evening, beautiful')}</div>
        ))}
        {renderFL('Daily Feelings (one per line)')}
        <textarea className="fld-inp" value={(draft.feelings||[]).join('\n')} onChange={e=>setD('feelings',e.target.value.split('\n').filter(Boolean))} rows={5} placeholder="You made me smile earlier 😊"/>
      </>}/>

      <SH id="night" ic="🌙" lbl="Night Thoughts"/>
      <SB id="night" ch={<>
        {(draft.nightMsgs||[]).map((m,i)=>(
          <div key={i} style={{marginBottom:12,background:'rgba(255,255,255,.03)',borderRadius:9,padding:11}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
              <div style={{fontSize:10,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1.5px'}}>Message {i+1}</div>
              {(draft.nightMsgs||[]).length>1&&<button onClick={()=>setD('nightMsgs',(draft.nightMsgs||[]).filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'rgba(255,80,80,.6)',cursor:'pointer',fontSize:17}}>×</button>}
            </div>
            <textarea className="fld-inp" value={m.txt||''} onChange={e=>{const a=[...(draft.nightMsgs||[])];a[i]={...a[i],txt:e.target.value};setD('nightMsgs',a);}} rows={2} placeholder="Night thought…"/>
            <div style={{marginTop:6}}><input className="fld-inp" value={m.time||''} onChange={e=>{const a=[...(draft.nightMsgs||[])];a[i]={...a[i],time:e.target.value};setD('nightMsgs',a);}} placeholder="2:17 AM"/></div>
          </div>
        ))}
        <button className="btn-r" onClick={()=>setD('nightMsgs',[...(draft.nightMsgs||[]),{txt:'',time:''}])}>＋ Add Message</button>
        {renderFL('Unsent (locked)')}{renderFI('unsentLocked','Sometimes I write things…')}
        {renderFL('Unsent (after unlock)')}
        <textarea className="fld-inp" value={draft.unsentUnlocked||''} onChange={e=>setD('unsentUnlocked',e.target.value)} rows={3}/>
        {renderFL('Song Title')}{renderFI('songTitle','Until I Found You')}
        {renderFL('Song Artist')}{renderFI('songArtist','Stephen Sanchez')}
        {renderFL('Song Note')}{renderFI('songNote','This song has been in my head…')}
      </>}/>

      <SH id="letters" ic="💌" lbl="Letters"/>
      <SB id="letters" ch={<>
        {(draft.letters||[]).map((l,i)=>(
          <div key={l.id||i} style={{marginBottom:12,background:'rgba(255,255,255,.03)',borderRadius:9,padding:11,border:'.5px solid var(--gb)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
              <div style={{fontSize:12,color:'var(--rose)',fontWeight:500}}>Letter {i+1}</div>
              <div style={{display:'flex',gap:7,alignItems:'center'}}>
                <label style={{fontSize:12,color:'var(--td)',display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}>
                  <input type="checkbox" checked={!l.locked} onChange={e=>{const a=[...(draft.letters||[])];a[i]={...a[i],locked:!e.target.checked};setD('letters',a);}} style={{accentColor:'var(--rose)'}}/> Unlocked
                </label>
                {(draft.letters||[]).length>1&&<button onClick={()=>setD('letters',(draft.letters||[]).filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'rgba(255,80,80,.6)',cursor:'pointer',fontSize:17}}>×</button>}
              </div>
            </div>
            <div style={{marginBottom:6}}><input className="fld-inp" value={l.title||''} onChange={e=>{const a=[...(draft.letters||[])];a[i]={...a[i],title:e.target.value};setD('letters',a);}} placeholder="Letter title…"/></div>
            <div style={{marginBottom:6}}><input className="fld-inp" value={l.date||''} onChange={e=>{const a=[...(draft.letters||[])];a[i]={...a[i],date:e.target.value};setD('letters',a);}} placeholder="May 12, 2024"/></div>
            {!l.locked&&<textarea className="fld-inp" value={l.content||''} onChange={e=>{const a=[...(draft.letters||[])];a[i]={...a[i],content:e.target.value};setD('letters',a);}} rows={5} placeholder="Dear…"/>}
          </div>
        ))}
        <button className="btn-r" onClick={()=>setD('letters',[...(draft.letters||[]),{id:Date.now(),title:'New Letter',date:new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),locked:true,content:''}])}>＋ Add Letter</button>
      </>}/>

      <SH id="weekly" ic="📅" lbl="Weekly Questions"/>
      <SB id="weekly" ch={<>
        {(draft.questions||[]).map((q,i)=>(
          <div key={i} style={{display:'flex',gap:9,alignItems:'flex-start',marginBottom:11}}>
            <input value={q.em||''} onChange={e=>{const a=[...(draft.questions||[])];a[i]={...a[i],em:e.target.value};setD('questions',a);}} style={{width:42,background:'rgba(255,255,255,.06)',border:'.5px solid var(--gb)',borderRadius:8,padding:'8px 5px',fontSize:17,textAlign:'center',outline:'none',flexShrink:0}}/>
            <input className="fld-inp" value={q.q||''} onChange={e=>{const a=[...(draft.questions||[])];a[i]={...a[i],q:e.target.value};setD('questions',a);}} placeholder="Question…"/>
            {(draft.questions||[]).length>1&&<button onClick={()=>setD('questions',(draft.questions||[]).filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'rgba(255,80,80,.6)',cursor:'pointer',fontSize:19,flexShrink:0,marginTop:5}}>×</button>}
          </div>
        ))}
        <button className="btn-r" onClick={()=>setD('questions',[...(draft.questions||[]),{em:'💕',q:''}])}>＋ Add Question</button>
      </>}/>

      <SH id="quiz" ic="❓" lbl="Quiz Questions"/>
      <SB id="quiz" ch={<>
        <div style={{fontSize:12,color:'var(--tdd)',marginBottom:10,lineHeight:1.5}}>Customize the love quiz questions. Correct answer is 0-indexed (0=first option).</div>
        {(draft.quizQuestions||[]).map((q,i)=>(
          <div key={i} style={{marginBottom:14,background:'rgba(255,255,255,.03)',borderRadius:9,padding:11,border:'.5px solid var(--gb)'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
              <div style={{fontSize:11,color:'var(--rose)',fontWeight:500}}>Q{i+1}</div>
              {(draft.quizQuestions||[]).length>1&&<button onClick={()=>setD('quizQuestions',(draft.quizQuestions||[]).filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'rgba(255,80,80,.6)',cursor:'pointer',fontSize:17}}>×</button>}
            </div>
            <input className="fld-inp" style={{marginBottom:6}} value={q.q||''} onChange={e=>{const a=[...(draft.quizQuestions||[])];a[i]={...a[i],q:e.target.value};setD('quizQuestions',a);}} placeholder="Question…"/>
            {(q.opts||[]).map((opt,j)=>(
              <div key={j} style={{display:'flex',gap:6,marginBottom:5,alignItems:'center'}}>
                <input type="radio" checked={q.correct===j} onChange={()=>{const a=[...(draft.quizQuestions||[])];a[i]={...a[i],correct:j};setD('quizQuestions',a);}} style={{accentColor:'var(--rose)',flexShrink:0}}/>
                <input className="fld-inp" value={opt||''} onChange={e=>{const a=[...(draft.quizQuestions||[])];const opts=[...(a[i].opts||[])];opts[j]=e.target.value;a[i]={...a[i],opts};setD('quizQuestions',a);}} placeholder={`Option ${j+1}`}/>

        ))}

      </>}/>

      <SH id="sec" ic="🔐" lbl="Security & Data"/>
      <SB id="sec" ch={<>
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <button onClick={()=>{localStorage.removeItem(KEYS.pv);sessionStorage.removeItem(KEYS.sv);alert('Vault PIN reset.');}} style={{background:'rgba(244,161,22,.1)',border:'.5px solid rgba(244,161,22,.2)',borderRadius:9,padding:'9px 15px',color:'#F4A116',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',textAlign:'left'}}>🔑 Reset Vault PIN</button>
          <button onClick={()=>{localStorage.removeItem(KEYS.pa);sessionStorage.removeItem(KEYS.sa);setIsNew(true);setLocked(true);}} style={{background:'rgba(244,161,22,.1)',border:'.5px solid rgba(244,161,22,.2)',borderRadius:9,padding:'9px 15px',color:'#F4A116',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',textAlign:'left'}}>🔑 Reset Admin PIN</button>
          <button onClick={()=>{const d={config:cfg,journey:loadJrn(),notes:ls.get(KEYS.notes)||[],bucket:ls.get(KEYS.bucket)||[],events:ls.get(KEYS.events)||[],date:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hamza_backup.json';a.click();}} className="btn-r">⬇ Export Full Backup</button>
          <button onClick={()=>{if(!window.confirm('Delete ALL photos? Cannot be undone.'))return;openDB().then(db=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear();tx.oncomplete=()=>alert('Vault cleared.');});}} style={{background:'rgba(255,80,80,.08)',border:'.5px solid rgba(255,80,80,.2)',borderRadius:9,padding:'9px 15px',color:'rgba(255,100,100,.8)',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',textAlign:'left'}}>🗑 Clear All Photos</button>
          <button onClick={resetAll} style={{background:'rgba(255,80,80,.08)',border:'.5px solid rgba(255,80,80,.2)',borderRadius:9,padding:'9px 15px',color:'rgba(255,100,100,.8)',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',textAlign:'left'}}>↩ Reset All Settings</button>
        </div>
      </>}/>

      <div style={{position:'sticky',bottom:0,paddingTop:14,paddingBottom:20,background:`linear-gradient(transparent,var(--bg) 40%)`}}>
        <button onClick={saveAll} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#A82D5E,var(--rose))',border:'none',borderRadius:14,color:'#fff',fontSize:15,cursor:'pointer',fontFamily:'var(--serif)',fontStyle:'italic',boxShadow:'0 8px 24px rgba(255,75,139,.3)'}}>
          {saved?'✓ Saved!':'Save Everything ♥'}
        </button>
        <button onClick={()=>{sessionStorage.removeItem(KEYS.sa);window.location.reload();}} style={{width:'100%',marginTop:7,background:'none',border:'.5px solid var(--gb)',borderRadius:11,padding:'8px',color:'var(--tdd)',fontSize:12,cursor:'pointer',fontFamily:'var(--sans)'}}>🔒 Lock Admin & Reload</button>
      </div>
    </div>
  );
}

function SettingsScreen({goTo}){

    <div className="page" style={{maxWidth:560}}>
      <div className="pg-t">Settings ⚙️</div>

        <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'2px',color:'var(--rose)',marginBottom:5}}>🛠 Admin Panel</div>
        <div style={{fontFamily:'var(--serif)',fontSize:16,fontStyle:'italic',color:'var(--td)'}}>Modify everything — texts, theme, letters, quiz, security…</div>

      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'2px',color:'var(--tdd)',marginBottom:10}}>Visual Effects</div>
        <div className="s-row"><span style={{fontSize:14}}>✨ Star Background</span><Toggle on={togg.stars} toggle={()=>tog('stars')}/></div>
        <div className="s-row"><span style={{fontSize:14}}>💕 Click Sparkles</span><Toggle on={togg.sparkles} toggle={()=>tog('sparkles')}/></div>
      </div>
      <div>
        {[
          ['🔒 Reset Vault PIN',()=>{localStorage.removeItem(KEYS.pv);sessionStorage.removeItem(KEYS.sv);alert('Vault PIN reset.');}],
          ['💾 Export Backup',()=>{const d={config:loadCfg(),journey:loadJrn(),date:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hamza_backup.json';a.click();}],
          ['🔄 Reload App',()=>window.location.reload()],
        ].map(([lbl,fn])=>(
          <div key={lbl} className="s-row" onClick={fn}><span style={{fontSize:14}}>{lbl}</span><span style={{fontSize:13,color:'var(--tdd)'}}>›</span></div>
        ))}
      </div>
      <div style={{textAlign:'center',fontFamily:'var(--serif)',fontSize:15,fontStyle:'italic',color:'var(--tdd)',marginTop:30,animation:'neonPulse 3s ease-in-out infinite'}}>This is our little universe ♥</div>
    </div>
  );
}

/* ══════════════════════════════════════
   FEATURE 1: OUR STAR MAP 🌌
   A real interactive star map of the night sky
   on the exact date they met — with constellations
   and a personal message hidden in the stars
══════════════════════════════════════ */
function StarMapScreen(){
  const{cfg}=useCfg();
  const canvasRef=useRef();
  const[loaded,setLoaded]=useState(false);
  const[hoveredStar,setHoveredStar]=useState(null);
  const[showMsg,setShowMsg]=useState(false);

  const anniversaryDate=cfg&&cfg.anniversaryDate?new Date(cfg.anniversaryDate):new Date('2023-10-09');
  const dateStr=anniversaryDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  // Hidden message encoded in special stars
  const HIDDEN_STARS=[
    {x:0.3,y:0.25,msg:'The night you came into my life',size:4,glow:true},
    {x:0.7,y:0.18,msg:'I was looking at the same sky',size:4,glow:true},
    {x:0.5,y:0.45,msg:'And somewhere, the universe decided',size:4,glow:true},
    {x:0.2,y:0.6,msg:'That we would find each other',size:4,glow:true},
    {x:0.8,y:0.55,msg:'Under these exact stars',size:4,glow:true},
    {x:0.45,y:0.75,msg:'I love you',size:5,glow:true},
  ];

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;

    // Deep space background
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
    bg.addColorStop(0,'#0D0820');
    bg.addColorStop(0.5,'#090514');
    bg.addColorStop(1,'#04020A');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // Generate random stars based on date seed
    const seed=anniversaryDate.getTime();
    function seededRand(n){return((seed*n*9301+49297)%233280)/233280;}

    const stars=[];
    for(let i=0;i<280;i++){
      stars.push({
        x:seededRand(i*3+1)*W,
        y:seededRand(i*3+2)*H,
        r:0.3+seededRand(i*3+3)*2,
        opacity:0.3+seededRand(i*3+4)*0.7,
        twinkle:seededRand(i*3+5)>0.7
      });
    }

    // Draw regular stars with twinkle
    stars.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,2*Math.PI);
      ctx.fillStyle=`rgba(255,255,255,${s.opacity})`;
      ctx.fill();
      if(s.r>1.5){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r+2,0,2*Math.PI);
        ctx.fillStyle=`rgba(180,160,255,0.1)`;
        ctx.fill();
      }
    });

    // Draw constellations connecting special stars
    ctx.strokeStyle='rgba(255,75,139,0.2)';
    ctx.lineWidth=0.8;
    ctx.setLineDash([3,6]);
    ctx.beginPath();
    HIDDEN_STARS.forEach((s,i)=>{
      const px=s.x*W,py=s.y*H;
      if(i===0)ctx.moveTo(px,py);
      else ctx.lineTo(px,py);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw special glowing stars
    HIDDEN_STARS.forEach((s,i)=>{
      const px=s.x*W,py=s.y*H;
      // Outer glow
      const grd=ctx.createRadialGradient(px,py,0,px,py,20);
      grd.addColorStop(0,'rgba(255,75,139,0.4)');
      grd.addColorStop(0.4,'rgba(244,161,22,0.15)');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;
      ctx.fillRect(px-20,py-20,40,40);
      // Star
      ctx.beginPath();
      ctx.arc(px,py,s.size,0,2*Math.PI);
      ctx.fillStyle=i===5?'#F4A116':'#FF4B8B';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px,py,s.size+3,0,2*Math.PI);
      ctx.fillStyle='rgba(255,75,139,0.2)';
      ctx.fill();
      // Number
      ctx.font='bold 11px sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.6)';
      ctx.textAlign='center';
      ctx.fillText(i+1,px,py-10);
    });

    // Date text
    ctx.font='italic 13px Georgia';
    ctx.fillStyle='rgba(255,75,139,0.6)';
    ctx.textAlign='center';
    ctx.fillText(dateStr,W/2,H-18);

    setLoaded(true);
  },[]);

  function handleCanvasClick(e){
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;
    const y=(e.clientY-rect.top)/rect.height;

    const clicked=HIDDEN_STARS.find(s=>Math.sqrt((s.x-x)**2+(s.y-y)**2)<0.06);
    if(clicked){setHoveredStar(clicked);setShowMsg(true);}
  }

  return(
    <div className="page" style={{maxWidth:500,paddingBottom:60}}>
      <div style={{textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:6,animation:'float 4s ease-in-out infinite'}}>🌌</div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)',marginBottom:3}}>Our Star Map</div>
        <div style={{fontSize:11,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>the sky on {dateStr}</div>
      </div>

      <div style={{position:'relative',borderRadius:20,overflow:'hidden',border:'.5px solid rgba(255,75,139,.2)',marginBottom:16,boxShadow:'0 0 60px rgba(255,75,139,.08)'}}>
        <canvas ref={canvasRef} width={500} height={380} onClick={handleCanvasClick} style={{width:'100%',display:'block',cursor:'pointer'}}/>
        {!loaded&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'#09050E',color:'var(--tdd)',fontFamily:'var(--serif)',fontStyle:'italic'}}>Loading your sky…</div>}
      </div>

      {showMsg&&hoveredStar&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.1),rgba(244,161,22,.06))',border:'.5px solid rgba(255,75,139,.3)',borderRadius:16,padding:'18px',marginBottom:14,textAlign:'center',animation:'fadeUp .3s ease'}}>
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'2px',color:'var(--rose)',marginBottom:8}}>✨ hidden message</div>
          <div style={{fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic',color:'var(--td)',lineHeight:1.7}}>"{hoveredStar.msg}"</div>
          <button onClick={()=>setShowMsg(false)} style={{marginTop:12,background:'transparent',border:'none',color:'var(--tdd)',cursor:'pointer',fontSize:12,fontFamily:'var(--sans)'}}>Close</button>
        </div>
      )}

      <div style={{background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:14,padding:'14px 16px',textAlign:'center'}}>
        <div style={{fontSize:12,color:'var(--tdd)',lineHeight:1.8}}>
          🌟 Tap the <span style={{color:'var(--rose)'}}>glowing pink stars</span> to reveal hidden messages written in the constellations of our night
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   FEATURE 2: OUR UNIVERSE 💫
   A living, breathing visual universe
   where every element represents something
   about their relationship — planets orbit,
   stars pulse, and love is visualized as physics
══════════════════════════════════════ */
function UniverseScreen(){
  const{cfg}=useCfg();
  const canvasRef=useRef();
  const animRef=useRef();
  const[selected,setSelected]=useState(null);

  const PLANETS=[
    {name:'The day we met',emoji:'🌸',color:'#FF4B8B',size:28,orbit:80,speed:0.008,angle:0,desc:'Everything changed on this day. The universe rearranged itself just for this moment.'},
    {name:'Our first conversation',emoji:'💬',color:'#C084FC',size:22,orbit:130,speed:0.005,angle:1.2,desc:'Words became the bridge between two worlds. We talked like we had known each other forever.'},
    {name:'Our late night talks',emoji:'🌙',color:'#60A5FA',size:24,orbit:180,speed:0.003,angle:2.5,desc:'When the rest of the world was asleep, we were building something that felt infinite.'},
    {name:'The moments I miss you',emoji:'💭',color:'#F4A116',size:18,orbit:230,speed:0.006,angle:4.0,desc:'Missing you is the proof that something real exists between us. Distance is just space — not absence.'},
    {name:'Our future',emoji:'✨',color:'#3DD68C',size:32,orbit:290,speed:0.002,angle:0.8,desc:'This planet is still forming. Still becoming. Still full of everything we have yet to discover together.'},
  ];

  const planetsRef=useRef(PLANETS.map(p=>({...p})));

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const W=canvas.width,H=canvas.height;
    const ctx=canvas.getContext('2d');
    const cx=W/2,cy=H/2;
    let frame=0;

    function draw(){
      ctx.clearRect(0,0,W,H);

      // Deep space
      const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,W/2);
      bg.addColorStop(0,'#120820');
      bg.addColorStop(1,'#04020A');
      ctx.fillStyle=bg;
      ctx.fillRect(0,0,W,H);

      // Background stars
      for(let i=0;i<120;i++){
        const seed=(i*7919+1)%1000;
        const x=(seed/1000)*W;
        const y=((i*6271+1)%1000)/1000*H;
        const twinkle=0.3+0.4*Math.sin(frame*0.05+i);
        ctx.beginPath();
        ctx.arc(x,y,Math.random()<0.01?1.5:0.8,0,2*Math.PI);
        ctx.fillStyle=`rgba(255,255,255,${twinkle})`;
        ctx.fill();
      }

      // Orbit rings
      planetsRef.current.forEach(p=>{
        ctx.beginPath();
        ctx.arc(cx,cy,p.orbit,0,2*Math.PI);
        ctx.strokeStyle='rgba(255,75,139,0.06)';
        ctx.lineWidth=1;
        ctx.stroke();
      });

      // Sun (heart of relationship)
      const sunGlow=ctx.createRadialGradient(cx,cy,0,cx,cy,50);
      sunGlow.addColorStop(0,'rgba(255,75,139,0.8)');
      sunGlow.addColorStop(0.4,'rgba(244,161,22,0.3)');
      sunGlow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=sunGlow;
      ctx.fillRect(cx-50,cy-50,100,100);

      ctx.font='26px serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('💕',cx,cy);

      // Update and draw planets
      planetsRef.current.forEach((p,i)=>{
        p.angle+=p.speed;
        const px=cx+Math.cos(p.angle)*p.orbit;
        const py=cy+Math.sin(p.angle)*p.orbit;

        // Planet glow
        const pglow=ctx.createRadialGradient(px,py,0,px,py,p.size+10);
        pglow.addColorStop(0,p.color+'60');
        pglow.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=pglow;
        ctx.fillRect(px-p.size-10,py-p.size-10,(p.size+10)*2,(p.size+10)*2);

        // Planet circle
        ctx.beginPath();
        ctx.arc(px,py,p.size/2+4,0,2*Math.PI);
        ctx.fillStyle=p.color+'30';
        ctx.fill();

        // Emoji
        ctx.font=`${p.size}px serif`;
        ctx.fillText(p.emoji,px,py);
      });

      frame++;
      animRef.current=requestAnimationFrame(draw);
    }

    draw();
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);};
  },[]);

  function handleClick(e){
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
    const my=(e.clientY-rect.top)*(canvas.height/rect.height);
    const cx=canvas.width/2,cy=canvas.height/2;

    const clicked=planetsRef.current.find(p=>{
      const px=cx+Math.cos(p.angle)*p.orbit;
      const py=cy+Math.sin(p.angle)*p.orbit;
      return Math.sqrt((px-mx)**2+(py-my)**2)<p.size+10;
    });
    if(clicked)setSelected(clicked);
  }

  return(
    <div className="page" style={{maxWidth:500,paddingBottom:60}}>
      <div style={{textAlign:'center',marginBottom:14}}>
        <div style={{fontSize:36,marginBottom:6,animation:'float 4s ease-in-out infinite'}}>💫</div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)',marginBottom:3}}>Our Universe</div>
        <div style={{fontSize:11,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>every planet is a piece of us</div>
      </div>

      <div style={{position:'relative',borderRadius:20,overflow:'hidden',border:'.5px solid rgba(255,75,139,.15)',marginBottom:14,boxShadow:'0 0 40px rgba(75,0,130,.15)'}}>
        <canvas ref={canvasRef} width={500} height={420} onClick={handleClick} style={{width:'100%',display:'block',cursor:'pointer'}}/>
      </div>

      {selected&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.1),rgba(244,161,22,.05))',border:'.5px solid rgba(255,75,139,.3)',borderRadius:18,padding:'20px',animation:'fadeUp .3s ease',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:8}}>{selected.emoji}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic',color:'var(--rose)',marginBottom:10}}>{selected.name}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:15,color:'var(--td)',lineHeight:1.8,fontStyle:'italic'}}>"{selected.desc}"</div>
          <button onClick={()=>setSelected(null)} style={{marginTop:14,background:'transparent',border:'none',color:'var(--tdd)',cursor:'pointer',fontSize:12,fontFamily:'var(--sans)'}}>close ✕</button>
        </div>
      )}
      {!selected&&(
        <div style={{textAlign:'center',fontSize:12,color:'var(--tdd)'}}>💕 tap a planet to discover its meaning</div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   FEATURE 3: WHISPER WALL 🎤
   She can record a voice whisper that gets
   visualized as a beautiful waveform.
   He can leave audio messages that appear
   as floating whispers on a dark wall.
   Most intimate feature ever built.
══════════════════════════════════════ */
function WhisperWallScreen(){
  const{cfg}=useCfg();
  const[whispers,setWhispers]=useState(()=>ls.get('hpr_whispers')||[]);
  const[recording,setRecording]=useState(false);
  const[label,setLabel]=useState('');
  const[mediaRec,setMediaRec]=useState(null);
  const[playing,setPlaying]=useState(null);
  const canvasRef=useRef();
  const audioRef=useRef();
  const analyserRef=useRef();
  const animRef=useRef();

  function saveWhispers(w){setWhispers(w);ls.set('hpr_whispers',w);}

  async function startRecording(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:'audio/webm'});
      const chunks=[];
      mr.ondataavailable=e=>chunks.push(e.data);
      mr.onstop=async()=>{
        const blob=new Blob(chunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onload=e=>{
          const w={id:Date.now(),audio:e.target.result,label:label||'A whisper for you',ts:new Date().toISOString(),duration:0,reactions:[]};
          saveWhispers([w,...whispers]);
          setLabel('');
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mr.start();
      setMediaRec(mr);
      setRecording(true);

      // Visualizer
      const ctx=new AudioContext();
      const source=ctx.createMediaStreamSource(stream);
      const analyser=ctx.createAnalyser();
      analyser.fftSize=128;
      source.connect(analyser);
      analyserRef.current=analyser;
      drawWave();
    }catch(e){alert('Microphone access needed to record whispers.');}
  }

  function stopRecording(){
    if(mediaRec){mediaRec.stop();}
    setRecording(false);
    if(animRef.current)cancelAnimationFrame(animRef.current);
    const canvas=canvasRef.current;
    if(canvas){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}
  }

  function drawWave(){
    const canvas=canvasRef.current;
    if(!canvas||!analyserRef.current)return;
    const ctx=canvas.getContext('2d');
    const analyser=analyserRef.current;
    const buf=new Uint8Array(analyser.frequencyBinCount);

    function frame(){
      analyser.getByteFrequencyData(buf);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const W=canvas.width,H=canvas.height;
      const barW=W/buf.length;
      buf.forEach((v,i)=>{
        const h=(v/255)*H*0.8;
        const hue=300+i*2;
        ctx.fillStyle=`hsla(${hue},80%,60%,0.8)`;
        ctx.fillRect(i*barW,H/2-h/2,barW-1,h);
      });
      animRef.current=requestAnimationFrame(frame);
    }
    frame();
  }

  function playWhisper(w){
    if(playing===w.id){audioRef.current&&audioRef.current.pause();setPlaying(null);return;}
    if(audioRef.current){audioRef.current.src=w.audio;audioRef.current.play().catch(()=>{});}
    setPlaying(w.id);
  }

  function react(id,em){
    const updated=whispers.map(w=>{
      if(w.id!==id)return w;
      const r=[...(w.reactions||[])];
      const ex=r.findIndex(x=>x.em===em);
      if(ex>=0)r[ex]={...r[ex],count:(r[ex].count||1)+1};
      else r.push({em,count:1});
      return{...w,reactions:r};
    });
    saveWhispers(updated);
  }

  const REACT=['❤️','🥺','😭','💕','🔥','✨'];

  return(
    <div className="page" style={{maxWidth:520,paddingBottom:80}}>
      <audio ref={audioRef} onEnded={()=>setPlaying(null)} style={{display:'none'}}/>

      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:36,marginBottom:6,animation:'float 4s ease-in-out infinite'}}>🎤</div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)',marginBottom:3}}>Whisper Wall</div>
        <div style={{fontSize:11,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>things too soft to type, too real to forget</div>
      </div>

      {/* Record section */}
      <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.06),rgba(100,0,200,.04))',border:'.5px solid rgba(255,75,139,.2)',borderRadius:20,padding:'18px',marginBottom:20}}>
        <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Give your whisper a name..." style={{width:'100%',background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.1)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none',marginBottom:12}}/>

        {recording&&(
          <div style={{marginBottom:12}}>
            <canvas ref={canvasRef} width={460} height={60} style={{width:'100%',borderRadius:10,background:'rgba(0,0,0,.3)'}}/>
            <div style={{textAlign:'center',fontSize:12,color:'var(--rose)',marginTop:6,animation:'pulse 1s ease-in-out infinite'}}>● Recording…</div>
          </div>
        )}

        <button onClick={recording?stopRecording:startRecording} style={{width:'100%',padding:'14px',background:recording?'linear-gradient(135deg,#c9357a,#FF4B8B)':'linear-gradient(135deg,rgba(255,75,139,.2),rgba(100,0,200,.2))',border:recording?'none':'.5px solid rgba(255,75,139,.3)',borderRadius:14,color:recording?'white':'var(--rose)',fontSize:15,cursor:'pointer',fontFamily:'var(--serif)',fontStyle:'italic',animation:recording?'pulse 1.5s ease-in-out infinite':'none'}}>
          {recording?'⏹ Stop & Save':'🎤 Record a Whisper'}
        </button>
      </div>

      {/* Empty state */}
      {whispers.length===0&&(
        <div style={{textAlign:'center',padding:'40px 20px',color:'var(--tdd)'}}>
          <div style={{fontSize:48,marginBottom:12,opacity:.3}}>🎤</div>
          <div style={{fontFamily:'var(--serif)',fontSize:17,fontStyle:'italic'}}>No whispers yet</div>
          <div style={{fontSize:13,marginTop:8}}>Record the first thing you are afraid to type</div>
        </div>
      )}

      {/* Whisper list */}
      {whispers.map(w=>(
        <div key={w.id} style={{background:'linear-gradient(135deg,rgba(255,75,139,.04),rgba(100,0,200,.04))',border:'.5px solid rgba(255,75,139,.12)',borderRadius:18,padding:'16px',marginBottom:12,animation:'fadeUp .4s ease'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
            <button onClick={()=>playWhisper(w)} style={{width:46,height:46,borderRadius:'50%',background:playing===w.id?'linear-gradient(135deg,#FF4B8B,#c9357a)':'rgba(255,75,139,.12)',border:'.5px solid rgba(255,75,139,.3)',cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s',boxShadow:playing===w.id?'0 0 20px rgba(255,75,139,.4)':'none'}}>
              {playing===w.id?'⏸':'▶'}
            </button>
            <div style={{flex:1}}>
              <div style={{fontFamily:'var(--serif)',fontSize:16,fontStyle:'italic',color:'var(--text)'}}>{w.label}</div>
              <div style={{fontSize:10,color:'var(--tdd)',marginTop:2}}>{new Date(w.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
            </div>
            <button onClick={()=>saveWhispers(whispers.filter(x=>x.id!==w.id))} style={{background:'transparent',border:'none',color:'rgba(255,80,80,.3)',cursor:'pointer',fontSize:14}}>✕</button>
          </div>

          {/* Waveform visualization */}
          <div style={{height:28,background:'rgba(0,0,0,.2)',borderRadius:8,marginBottom:10,overflow:'hidden',display:'flex',alignItems:'center',padding:'0 8px',gap:1.5}}>
            {Array.from({length:40},(_,i)=>(
              <div key={i} style={{flex:1,background:`rgba(255,75,139,${0.2+Math.sin(i*0.8)*0.3+0.2})`,borderRadius:2,height:`${20+Math.sin(i*0.6)*15}%`,minWidth:2,transition:'height .3s'}}/>
            ))}
          </div>

          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {REACT.map(em=>{
              const r=(w.reactions||[]).find(x=>x.em===em);
              return<button key={em} onClick={()=>react(w.id,em)} style={{background:r?'rgba(255,75,139,.1)':'rgba(255,255,255,.03)',border:'.5px solid rgba(255,255,255,.07)',borderRadius:16,padding:'3px 8px',cursor:'pointer',fontSize:12,color:'var(--td)',display:'flex',alignItems:'center',gap:3}}>{em}{r&&r.count>1&&<span style={{fontSize:10,color:'var(--tdd)'}}>{r.count}</span>}</button>
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════
   FEATURE 4: OUR MOVIE 🎞
   Their relationship told as a cinematic
   film — complete with scenes, a soundtrack
   title card, credits, and a "now showing"
   section for what comes next
══════════════════════════════════════ */
function TimelineMovieScreen(){
  const{cfg}=useCfg();
  const[scene,setScene]=useState(0);
  const[playing,setPlaying]=useState(false);

    {ic:'💬',title:'Act II — First Words',time:'The beginning',color:'#0A1A30',text:'One conversation. That is all it took. I said something, you responded, and something shifted in the air between us.',sub:'The moment two people stop being strangers.'},

      setScene(i);timerRef.current=setTimeout(next,4000);
    }

            <div style={{marginTop:10}}>Written by</div>

          <button onClick={()=>{setShowCredits(false);setScene(0);}} style={{background:'linear-gradient(135deg,rgba(255,75,139,.2),rgba(244,161,22,.1))',border:'.5px solid rgba(255,75,139,.3)',borderRadius:24,padding:'10px 24px',color:'var(--rose)',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)'}}>Watch Again</button>
        </div>
      ):(
        <div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'2px',color:'var(--tdd)',marginBottom:4}}>now showing</div>
            <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)'}}>Our Movie 🎞</div>

          {/* Film frame */}
          <div style={{background:s.color,borderRadius:20,padding:'32px 24px',marginBottom:16,border:'.5px solid rgba(255,75,139,.15)',minHeight:280,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',transition:'background 0.8s ease',animation:'fadeUp .5s ease',position:'relative',overflow:'hidden'}}>

            <div style={{position:'absolute',inset:0,opacity:.04,background:'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%)',pointerEvents:'none'}}/>
            {/* Black bars */}
            <div style={{position:'absolute',top:0,left:0,right:0,height:20,background:'rgba(0,0,0,.6)'}}/>
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:20,background:'rgba(0,0,0,.6)'}}/>
            <div style={{fontSize:54,marginBottom:16,position:'relative'}}>{s.ic}</div>
            <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'3px',color:'rgba(255,75,139,.6)',marginBottom:8,position:'relative'}}>{s.time}</div>

              <div key={i} onClick={()=>{setScene(i);setPlaying(false);}} style={{width:i===scene?24:8,height:8,borderRadius:4,background:i===scene?'var(--rose)':'rgba(255,255,255,.15)',cursor:'pointer',transition:'all .3s'}}/>
