/* ══════════════════════════════════════
   FEATURE 5: LOVE CLOCK ⏰
   Not a countdown — a living clock that
   shows how long they have been in each
   other's lives, down to the second.
   With a "love language" visualization —
   every second is a heartbeat, every minute
   is a thought, every hour is a memory.
══════════════════════════════════════ */
function LoveClockScreen(){
  const{cfg}=useCfg();
  const[now,setNow]=useState(new Date());
  const canvasRef=useRef();
  const animRef=useRef();

  const startDate=cfg&&cfg.anniversaryDate?new Date(cfg.anniversaryDate):new Date('2023-10-09');
  const diff=Math.max(0,now-startDate);
  const totalSecs=Math.floor(diff/1000);
  const totalMins=Math.floor(diff/60000);
  const totalHours=Math.floor(diff/3600000);
  const totalDays=Math.floor(diff/86400000);
  const yrs=Math.floor(totalDays/365);
  const months=Math.floor((totalDays%365)/30);
  const days=totalDays%30;
  const hours=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  const secs=Math.floor((diff%60000)/1000);

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const cx=W/2,cy=H/2;
    let frame=0;

    function draw(){
      ctx.clearRect(0,0,W,H);

      // Background
      const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,cx);
      bg.addColorStop(0,'#160820');
      bg.addColorStop(1,'#07040E');
      ctx.fillStyle=bg;
      ctx.fillRect(0,0,W,H);

      const nowTime=new Date();
      const s2=nowTime.getSeconds()+nowTime.getMilliseconds()/1000;
      const m2=nowTime.getMinutes()+s2/60;
      const h2=nowTime.getHours()%12+m2/60;

      // Rings
      const rings=[
        {r:90,val:s2/60,color:'#FF4B8B',label:'heartbeats',w:3},
        {r:68,val:m2/60,color:'#C084FC',label:'thoughts',w:3},
        {r:46,val:h2/12,color:'#F4A116',label:'memories',w:3},
      ];

      rings.forEach(ring=>{
        // Background ring
        ctx.beginPath();
        ctx.arc(cx,cy,ring.r,0,2*Math.PI);
        ctx.strokeStyle='rgba(255,255,255,.05)';
        ctx.lineWidth=ring.w+2;
        ctx.stroke();

        // Progress arc
        ctx.beginPath();
        ctx.arc(cx,cy,ring.r,-Math.PI/2,-Math.PI/2+ring.val*2*Math.PI);
        ctx.strokeStyle=ring.color;
        ctx.lineWidth=ring.w;
        ctx.lineCap='round';
        ctx.stroke();

        // Dot at end
        const endA=-Math.PI/2+ring.val*2*Math.PI;
        const dx=cx+Math.cos(endA)*ring.r;
        const dy=cy+Math.sin(endA)*ring.r;
        const grd=ctx.createRadialGradient(dx,dy,0,dx,dy,8);
        grd.addColorStop(0,ring.color);
        grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd;
        ctx.fillRect(dx-8,dy-8,16,16);
        ctx.beginPath();
        ctx.arc(dx,dy,4,0,2*Math.PI);
        ctx.fillStyle=ring.color;
        ctx.fill();
      });

      // Heart in center
      const pulse=1+0.05*Math.sin(frame*0.15);
      ctx.save();
      ctx.translate(cx,cy);
      ctx.scale(pulse,pulse);
      ctx.font='22px serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('💕',0,0);
      ctx.restore();

      // Particles on beat
      if(Math.floor(frame)%8===0){
        for(let i=0;i<3;i++){
          const a=Math.random()*2*Math.PI;
          const spd=0.5+Math.random();
          ctx.beginPath();
          ctx.arc(cx+Math.cos(a)*15,cy+Math.sin(a)*15,1,0,2*Math.PI);
          ctx.fillStyle='rgba(255,75,139,0.6)';
          ctx.fill();
        }
      }

      frame++;
      animRef.current=requestAnimationFrame(draw);
    }
    draw();
    return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);};
  },[now]);

  const STATS=[
    {n:totalDays.toLocaleString(),l:'Days Together',ic:'📅',color:'#FF4B8B'},
    {n:totalHours.toLocaleString(),l:'Hours of Us',ic:'⏰',color:'#C084FC'},
    {n:totalMins.toLocaleString(),l:'Minutes Shared',ic:'💭',color:'#F4A116'},
    {n:totalSecs.toLocaleString(),l:'Heartbeats',ic:'💕',color:'#3DD68C'},
  ];

  return(
    <div className="page" style={{maxWidth:500,paddingBottom:60}}>
      <div style={{textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:6}}>⏰</div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--text)',marginBottom:3}}>Love Clock</div>
        <div style={{fontSize:11,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>every second counts</div>
      </div>

      <div style={{position:'relative',borderRadius:20,overflow:'hidden',marginBottom:16,display:'flex',justifyContent:'center',background:'#07040E',padding:'10px 0'}}>
        <canvas ref={canvasRef} width={260} height={260} style={{display:'block'}}/>
      </div>

      {/* Big time display */}
      <div style={{background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:18,padding:'20px',marginBottom:14,textAlign:'center'}}>
        <div style={{fontFamily:'var(--serif)',fontSize:36,fontStyle:'italic',color:'var(--rose)',letterSpacing:2,marginBottom:4}}>
          {String(hours).padStart(2,'0')}:{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
        </div>
        <div style={{fontSize:12,color:'var(--tdd)'}}>today's time together</div>
        <div style={{fontFamily:'var(--serif)',fontSize:16,color:'var(--td)',marginTop:10,fontStyle:'italic'}}>
          {yrs>0?`${yrs} year${yrs>1?'s':''}, `:''}
          {months>0?`${months} month${months>1?'s':''}, `:''}
          {days} day{days!==1?'s':''}
        </div>
        <div style={{fontSize:11,color:'var(--tdd)',marginTop:4}}>since {startDate.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
      </div>

      {/* Stats grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
        {STATS.map(s=>(
          <div key={s.l} style={{background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:14,padding:'14px',textAlign:'center'}}>
            <div style={{fontSize:20,marginBottom:4}}>{s.ic}</div>
            <div style={{fontSize:18,fontWeight:500,color:s.color,marginBottom:2,fontVariantNumeric:'tabular-nums'}}>{s.n}</div>
            <div style={{fontSize:9,color:'var(--tdd)',textTransform:'uppercase',letterSpacing:'1px'}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.06),rgba(244,161,22,.04))',border:'.5px solid rgba(255,75,139,.15)',borderRadius:14,padding:'16px',textAlign:'center'}}>
        <div style={{fontFamily:'var(--serif)',fontSize:15,fontStyle:'italic',color:'var(--td)',lineHeight:1.8}}>
          Every second that passes is a second we have been alive at the same time in this world. That alone is something.
        </div>
      </div>
    </div>
  );
}


function PodcastScreen(){
  const{cfg}=useCfg();
  const[pods,setPods]=useState(()=>ls.get(KEYS.podcasts)||[]);
  const[playing,setPlaying]=useState(null);
  const[progress,setProgress]=useState({});
  const[duration,setDuration]=useState({});
  const[paused,setPaused]=useState(true);
  const[showUpload,setShowUpload]=useState(false);
  const[form,setForm]=useState({title:'',subject:'',desc:'',mood:'💕',file:null});
  const[uploading,setUploading]=useState(false);
  const audioRef=useRef(null);
  const fileRef=useRef();
  const isAdmin=cfg&&cfg.isAdminView;

  const MOODS=['💕','🌙','🔥','✨','😭','😂','💭','🥰','⚡','🌸'];

  useEffect(()=>{
    const audio=audioRef.current;
    if(!audio)return;
    const onTime=()=>{
      if(playing!==null){
        setProgress(p=>({...p,[playing]:audio.currentTime}));
      }
    };
    const onDur=()=>{
      if(playing!==null){
        setDuration(d=>({...d,[playing]:audio.duration}));
      }
    };
    const onEnd=()=>setPaused(true);
    audio.addEventListener('timeupdate',onTime);
    audio.addEventListener('loadedmetadata',onDur);
    audio.addEventListener('ended',onEnd);
    return()=>{audio.removeEventListener('timeupdate',onTime);audio.removeEventListener('loadedmetadata',onDur);audio.removeEventListener('ended',onEnd);};
  },[playing]);

  function playPod(idx){
    const audio=audioRef.current;
    if(!audio)return;
    if(playing===idx){
      if(paused){audio.play();setPaused(false);}
      else{audio.pause();setPaused(true);}
      return;
    }
    audio.src=pods[idx].audioUrl;
    audio.currentTime=progress[idx]||0;
    audio.play().then(()=>setPaused(false)).catch(()=>{});
    setPlaying(idx);
    setPaused(false);
    // mark as listened
    const updated=pods.map((p,i)=>i===idx?{...p,listened:true,listenedAt:new Date().toISOString()}:p);
    setPods(updated);ls.set(KEYS.podcasts,updated);
  }

  function seekTo(idx,val){
    const audio=audioRef.current;
    if(audio&&playing===idx){audio.currentTime=val;}
    setProgress(p=>({...p,[idx]:val}));
  }

  function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}

  async function upload(){
    if(!form.file||!form.title)return;
    setUploading(true);
    try{
      const reader=new FileReader();
      const b64=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(form.file);});
      const pod={
        id:Date.now(),
        title:form.title,
        subject:form.subject||'A message for you',
        desc:form.desc||'',
        mood:form.mood||'💕',
        audioUrl:b64,
        duration:0,
        uploadedAt:new Date().toISOString(),
        listened:false,
        listenedAt:null,
        reactions:[]
      };
      const updated=[pod,...pods];
      setPods(updated);
      ls.set(KEYS.podcasts,updated);
      setForm({title:'',subject:'',desc:'',mood:'💕',file:null});
      setShowUpload(false);
    }catch(e){alert('Upload failed. Try a smaller file.');}
    setUploading(false);
  }

  function deletePod(id){
    if(!window.confirm('Delete this podcast?'))return;
    const updated=pods.filter(p=>p.id!==id);
    setPods(updated);ls.set(KEYS.podcasts,updated);
    if(playing!==null&&pods[playing]&&pods[playing].id===id){
      audioRef.current&&audioRef.current.pause();
      setPlaying(null);setPaused(true);
    }
  }

  function addReaction(idx,em){
    const updated=pods.map((p,i)=>{
      if(i!==idx)return p;
      const reactions=[...(p.reactions||[])];
      const ex=reactions.findIndex(r=>r.em===em);
      if(ex>=0)reactions[ex]={...reactions[ex],count:(reactions[ex].count||1)+1};
      else reactions.push({em,count:1});
      return{...p,reactions};
    });
    setPods(updated);ls.set(KEYS.podcasts,updated);
  }

  const REACT_EMS=['❤️','😭','😂','🔥','💕','✨'];

  return(
    <div className="page" style={{maxWidth:560,paddingBottom:100}}>
      <audio ref={audioRef} style={{display:'none'}}/>

      {/* Header */}
      <div style={{textAlign:'center',marginBottom:28,paddingTop:8}}>
        <div style={{fontSize:42,marginBottom:8,animation:'float 3s ease-in-out infinite'}}>🎙</div>
        <div style={{fontFamily:'var(--serif)',fontSize:26,fontStyle:'italic',color:'var(--text)',marginBottom:4}}>Podcasts for You</div>
        <div style={{fontSize:12,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>recorded with love</div>
      </div>

      {/* Admin upload button */}
      <div style={{marginBottom:20,textAlign:'center'}}>
        <button onClick={()=>setShowUpload(!showUpload)} style={{background:'linear-gradient(135deg,rgba(255,75,139,.2),rgba(244,161,22,.1))',border:'.5px solid rgba(255,75,139,.4)',borderRadius:30,padding:'10px 24px',color:'var(--rose)',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',letterSpacing:'0.5px'}}>
          {showUpload?'✕ Cancel':'🎙 Upload New Episode'}
        </button>
      </div>

      {/* Upload form */}
      {showUpload&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.06),rgba(244,161,22,.04))',border:'.5px solid rgba(255,75,139,.2)',borderRadius:18,padding:'20px',marginBottom:24,animation:'fadeUp .3s ease'}}>
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'2px',color:'var(--rose)',marginBottom:16}}>New Episode</div>

          <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--tdd)',marginBottom:5}}>Episode Title *</div>
          <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Why I love you today" style={{width:'100%',background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none',marginBottom:12}}/>

          <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--tdd)',marginBottom:5}}>Subject / Topic</div>
          <input value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))} placeholder="e.g. Things I never said out loud" style={{width:'100%',background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none',marginBottom:12}}/>

          <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--tdd)',marginBottom:5}}>Description (optional)</div>
          <textarea value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="A little note before she listens..." rows={2} style={{width:'100%',background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none',resize:'vertical',marginBottom:12}}/>

            {MOODS.map(m=>(
              <span key={m} onClick={()=>setForm(f=>({...f,mood:m}))} style={{fontSize:22,cursor:'pointer',padding:4,borderRadius:8,background:form.mood===m?'rgba(255,75,139,.2)':'transparent',border:form.mood===m?'.5px solid rgba(255,75,139,.4)':'.5px solid transparent',transition:'all .15s'}}>{m}</span>
            ))}

          <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--tdd)',marginBottom:8}}>Audio File * (mp3, m4a, wav)</div>
          <input ref={fileRef} type="file" accept="audio/*" onChange={e=>setForm(f=>({...f,file:e.target.files[0]}))} style={{display:'none'}}/>

            {form.file
              ?<span style={{color:'var(--rose)',fontSize:13}}>🎵 {form.file.name}</span>
              :<span style={{color:'var(--tdd)',fontSize:13}}>Tap to choose audio file</span>

function getQuitData() {

function getCleanDays() {
  const d = getQuitData();
  if (!d.startDate) return 0;
  const diff = Date.now() - new Date(d.startDate).getTime();
  return Math.max(0, Math.floor(diff / 86400000));
}

function getCleanHours() {
  const d = getQuitData();
  if (!d.startDate) return 0;

      setSecs(s => { if (s <= 1) { clearInterval(timerRef.current); setMode('done'); return 0; } return s - 1; });

function DailyChallengeScreen() {
  const today = new Date().toISOString().slice(0,10);
  const todayIdx = Math.floor(Date.now() / 86400000) % DAILY_CHALLENGES.length;
  const ch = DAILY_CHALLENGES[todayIdx];
  const [done, setDone] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem(CHALLENGE_KEY)||'{}'); return d[today] === true; } catch { return false; }
  });
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CHALLENGE_KEY)||'{}'); } catch { return {}; }
  });
  const toast = useToast();

  const markDone = () => {
    const h = { ...history, [today]: true };
    setDone(true); setHistory(h);
    localStorage.setItem(CHALLENGE_KEY, JSON.stringify(h));
    toast('Challenge done! 💚', 'success');
  };

  const streak = (() => {
    let s = 0;
    for (let i = 0; i < 60; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const k = d.toISOString().slice(0,10);
      if (history[k]) s++; else break;
    }
    return s;
  })();

  const totalDone = Object.values(history).filter(Boolean).length;

  return createElement('div', { className: 'page', style: { maxWidth: 560 } },

        createElement('div', { style: { fontSize: 22, fontWeight: 500, color: 'var(--rose)' } }, streak),

          ),

  );
}

    settings:<SettingsScreen goTo={setScreen}/>,

    cravingsos:<CravingSOS/>,
    healthtl:<HealthTimelineScreen/>,

    supportwall:<SupportWallScreen/>,
    whyiquit:<WhyIQuitScreen/>,
    relapse:<RelapseCompassScreen/>,
    quittogether:<QuitTogetherScreen/>,
        triggerlog:<TriggerLogScreen/>,

    admin:<AdminScreen/>,

      <div className="secret-msg">You found the secret… ↑↑↓↓←→←→BA<br/><br/>This is a universe built with love, just for you. Every pixel, every word — it's all you.</div>

  return(

                {sec.items.map(n=>(
                  <button key={n.id} className={`ni ${screen===n.id?'on':''}`} onClick={()=>{setScreen(n.id);setSbOpen(false);}}>
                    <span className="ni-ic">{n.ic}</span>
                    <span>{n.l}</span>

                    {screen===n.id&&<div className="ni-dot"/>}
                  </button>
                ))}

            ))}
          </nav>

          <div className="sb-bot">
            <div className="ai-mini">
              <div className="ai-av-s">💕<div className="ai-g"/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:500}}>{cfg.aiName} ♥</div>
                <div style={{fontSize:10,color:'#3DD68C',marginTop:1}}>● Always here</div>

        {/* CONTENT */}

          {(()=>{
            try{return SCREENS[screen]||SCREENS.home;}

  );
}

<script>
// ═══════════════════════════════════════════════════════
// SERVICE WORKER — registered inline via blob URL
// Caches the app for offline use on iPhone
// ═══════════════════════════════════════════════════════
(function() {
  if (!('serviceWorker' in navigator)) return;

  const SW_CODE = `
const CACHE = 'kenza-v1';
const ASSETS = [
  self.location.pathname || '/',
  'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js',
];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => {
      // Cache what we can, ignore failures
      return Promise.allSettled(ASSETS.map(url => c.add(url).catch(() => {})));
    }).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  // Network first, fall back to cache
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request).then(res => {
      if (res && res.status === 200) {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    }).catch(() => caches.match(e.request))
  );
});
  `;

  try {
    const blob = new Blob([SW_CODE], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, { scope: '/' })
      .then(reg => {
        console.log('[PWA] Service worker registered');
        // Check for updates
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[PWA] New version available');
            }
          });
        });
      })
      .catch(e => console.log('[PWA] SW reg failed:', e));
  } catch(e) {
    console.log('[PWA] Blob SW not supported:', e);
  }
})();

// ═══════════════════════════════════════════════════════
// INSTALL BANNER — for iOS "Add to Home Screen"
// Shows a gentle prompt after 3 seconds
// ═══════════════════════════════════════════════════════
(function() {
  // Detect if running as PWA already
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;

  if (isStandalone) {
    console.log('[PWA] Running as installed app ✓');
    // Add body class for PWA-specific styles
    document.body.classList.add('is-pwa');
    return;
  }

  // iOS Safari detection
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);

  if (!isIOS && !isSafari) return;

  // Don't show if dismissed recently
  const dismissed = localStorage.getItem('pwa_banner_dismissed');
  if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;

  // Create and show banner after 3s
  setTimeout(() => {
    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.innerHTML = \`
      <div class="pwa-banner-ic">💕</div>
      <div class="pwa-banner-txt">
        <div class="pwa-banner-title">Installer Kenza Private Reality</div>
        <div class="pwa-banner-sub">
          Appuie sur <strong style="color:var(--rose)">
          <svg style="width:14px;height:14px;vertical-align:middle;margin:0 2px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
          Partager</strong> puis <strong style="color:var(--rose)">"Sur l'écran d'accueil"</strong>
        </div>
      </div>
      <button class="pwa-banner-close" onclick="
        this.closest('#pwa-install-banner').style.display='none';
        localStorage.setItem('pwa_banner_dismissed', Date.now());
      ">✕</button>
    \`;
    document.body.appendChild(banner);
    // Show with slight delay for animation
    requestAnimationFrame(() => {
      requestAnimationFrame(() => banner.classList.add('show'));
    });

    // Auto-dismiss after 12s
    setTimeout(() => {
      if (banner.parentNode) {
        banner.style.opacity = '0';
        banner.style.transition = 'opacity .4s ease';
        setTimeout(() => banner.remove(), 400);
      }
    }, 12000);
  }, 3500);
})();

// ═══════════════════════════════════════════════════════
// PERFORMANCE: Haptic feedback on iOS
// ═══════════════════════════════════════════════════════
window.haptic = function(type) {
  if (!window.navigator.vibrate) return;
  const patterns = { light: [10], medium: [20], heavy: [30], success: [10, 50, 10] };
  navigator.vibrate(patterns[type] || patterns.light);
};

// Add haptic to buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button, .ni, .qb, .mood-btn, .pin-key, .btn-r, .vact');
  if (btn) haptic('light');
}, { passive: true });

// ═══════════════════════════════════════════════════════
// PERFORMANCE: Prevent scroll bounce on iOS (PWA mode)
// ═══════════════════════════════════════════════════════
document.addEventListener('touchmove', function(e) {
  if (e.target === document.body || e.target === document.documentElement) {
    e.preventDefault();
  }
}, { passive: false });

// ═══════════════════════════════════════════════════════
// PERFORMANCE: Preload next likely screens
// ═══════════════════════════════════════════════════════
window.addEventListener('load', function() {
  // Preload Google Fonts
  const link = document.createElement('link');
  link.rel = 'preconnect';
  link.href = 'https://fonts.gstatic.com';
  link.crossOrigin = 'anonymous';
  document.head.appendChild(link);

  // Mark app as ready
  console.log('[Kenza] App loaded ✓', new Date().toLocaleTimeString());
});
</script>
