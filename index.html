<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#09050E;}
#root{height:100%;}
#boot{position:fixed;inset:0;background:#09050E;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .5s ease;}
#boot.hide{opacity:0;pointer-events:none;}
#boot-heart{font-size:52px;animation:bootPulse 1.2s ease-in-out infinite;}
#boot-txt{font-family:Georgia,serif;font-size:22px;font-style:italic;color:rgba(255,75,139,.9);}
#boot-sub{font-size:11px;color:rgba(242,232,238,.3);letter-spacing:3px;text-transform:uppercase;}
@keyframes bootPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(255,75,139,.4))}50%{transform:scale(1.15);filter:drop-shadow(0 0 20px rgba(255,75,139,.8))}}
:root{
  --rose:#FF4B8B;--rose-d:rgba(255,75,139,.13);--rose-b:rgba(255,75,139,.3);
  --bg:#09050E;--text:#F2E8EE;--td:rgba(242,232,238,.58);--tdd:rgba(242,232,238,.3);
  --glass:rgba(255,255,255,.04);--gb:rgba(255,255,255,.075);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --a1:rgba(170,25,75,.16);--a2:rgba(255,75,139,.07);
}
@keyframes breathe{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes hb{0%,100%{transform:scale(1)}14%{transform:scale(1.2)}28%{transform:scale(1)}42%{transform:scale(1.1)}}
@keyframes pinShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes heartPop{0%{transform:scale(0) translateY(0);opacity:1}60%{transform:scale(1.4) translateY(-20px);opacity:.9}100%{transform:scale(1) translateY(-60px);opacity:0}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;border-radius:50%;background:var(--rose);cursor:pointer;box-shadow:0 0 6px rgba(255,75,139,.5);}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--rose);cursor:pointer;border:none;}
@keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,75,139,.3)}50%{box-shadow:0 0 30px rgba(255,75,139,.7),0 0 60px rgba(255,75,139,.3)}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes breatheCircle{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.5);opacity:1}}
@keyframes starFloat{0%{transform:translateY(0) translateX(0)}33%{transform:translateY(-15px) translateX(8px)}66%{transform:translateY(-5px) translateX(-5px)}100%{transform:translateY(0) translateX(0)}}
@keyframes spinWheel{from{transform:rotate(0deg)}to{transform:rotate(calc(var(--spin-deg,1080deg)))}  }
@keyframes neonPulse{0%,100%{text-shadow:0 0 4px var(--rose),0 0 8px var(--rose)}50%{text-shadow:0 0 8px var(--rose),0 0 20px var(--rose),0 0 40px var(--rose)}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}

/* ═══ APP SHELL ═══ */
.app{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;position:relative;}
.app::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 65% 55% at 72% 12%,var(--a1) 0%,transparent 60%),
             radial-gradient(ellipse 45% 60% at 8% 85%,rgba(85,15,125,.11) 0%,transparent 50%),
             radial-gradient(ellipse 35% 40% at 88% 72%,var(--a2) 0%,transparent 40%);}

/* ═══ STAR PARTICLES ═══ */
.stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;}

/* ═══ SPARKLE CURSOR ═══ */
.sparkle{position:fixed;pointer-events:none;z-index:9998;font-size:14px;animation:heartPop .8s ease forwards;}

/* ═══ CONFETTI ═══ */
.confetti-piece{position:fixed;top:-20px;pointer-events:none;z-index:9990;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;}

/* ═══ SIDEBAR ═══ */
.sb{width:224px;flex-shrink:0;height:100vh;background:rgba(14,7,19,.92);border-right:.5px solid var(--gb);backdrop-filter:blur(28px);display:flex;flex-direction:column;z-index:10;position:relative;}
.sb-top{padding:20px 18px 16px;border-bottom:.5px solid var(--gb);position:relative;}
.sb-profile{width:48px;height:48px;border-radius:50%;border:2px solid var(--rose-b);overflow:hidden;margin-bottom:10px;cursor:pointer;position:relative;background:linear-gradient(135deg,#6B1040,#C23B6E,var(--rose));}
.sb-profile img{width:100%;height:100%;object-fit:cover;}
.sb-profile-ic{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;}
.sb-name{font-family:var(--serif);font-size:24px;font-weight:300;font-style:italic;line-height:1.1;}
.sb-h{color:var(--rose);animation:hb 2.5s ease-in-out infinite;display:inline-block;filter:drop-shadow(0 0 6px rgba(255,75,139,.7));}
.sb-tag{font-size:11px;color:var(--tdd);font-style:italic;margin-top:4px;line-height:1.5;white-space:pre-line;}
.sb-streak{display:flex;align-items:center;gap:5px;margin-top:8px;background:rgba(255,75,139,.08);border:.5px solid rgba(255,75,139,.2);border-radius:20px;padding:4px 10px;width:fit-content;}
.sb-streak-fire{font-size:12px;animation:wiggle 2s ease-in-out infinite;}
.sb-streak-txt{font-size:11px;color:var(--rose);}
.sb-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--tdd);padding:8px 12px 4px;margin-top:4px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--td);background:none;border:none;width:100%;font-family:var(--sans);transition:all .16s;text-align:left;position:relative;}
.ni:hover{background:var(--glass);color:var(--text);}
.ni.on{background:var(--rose-d);color:var(--rose);font-weight:500;}
.ni-ic{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.ni-badge{font-size:10px;background:var(--rose);color:#fff;border-radius:8px;padding:1px 6px;margin-left:auto;font-weight:500;flex-shrink:0;}
.ni-new{font-size:9px;background:linear-gradient(90deg,#F4A116,#FF6B00);color:#fff;border-radius:6px;padding:2px 5px;margin-left:auto;flex-shrink:0;}
.ni-dot{width:5px;height:5px;background:var(--rose);border-radius:50%;margin-left:auto;animation:breathe 2.5s infinite;flex-shrink:0;}
.sb-bot{padding:12px;border-top:.5px solid var(--gb);flex-shrink:0;}
.ai-mini{background:var(--glass);border:.5px solid var(--gb);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:9px;}
.ai-av-s{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6B1040,#C23B6E,var(--rose));display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;flex-shrink:0;}
.ai-g{position:absolute;bottom:0;right:0;width:9px;height:9px;background:#3DD68C;border-radius:50%;border:1.5px solid var(--bg);}
.love-txt{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--rose);text-align:center;padding:8px 0 2px;filter:drop-shadow(0 0 10px rgba(255,75,139,.5));animation:neonPulse 3s ease-in-out infinite;}
.days-badge{background:linear-gradient(135deg,rgba(255,75,139,.12),rgba(123,63,160,.12));border:.5px solid rgba(255,75,139,.25);border-radius:10px;padding:7px 12px;text-align:center;margin-top:8px;}
.days-n{font-size:22px;font-weight:500;color:var(--rose);}
.days-l{font-size:9px;color:var(--tdd);text-transform:uppercase;letter-spacing:1.5px;}

/* ═══ CONTENT ═══ */
.content{flex:1;height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,75,139,.25);border-radius:2px}

/* ═══ HELPERS ═══ */
.gc{background:var(--glass);border:.5px solid var(--gb);border-radius:16px;}
.page{padding:32px 32px;animation:fadeUp .4s ease;min-height:100vh;}
.pg-t{font-family:var(--serif);font-size:30px;font-weight:300;font-style:italic;margin-bottom:4px;}
.pg-s{font-size:13px;color:var(--tdd);font-style:italic;margin-bottom:22px;}
.btn-r{background:rgba(255,75,139,.14);border:.5px solid rgba(255,75,139,.28);color:var(--rose);padding:9px 18px;border-radius:24px;font-size:13px;cursor:pointer;font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;transition:all .18s;}
.btn-r:hover{background:rgba(255,75,139,.25);transform:translateY(-1px);}
.btn-solid{background:linear-gradient(135deg,#A82D5E,var(--rose));border:none;border-radius:12px;color:#fff;font-size:14px;cursor:pointer;font-family:var(--sans);padding:12px 24px;transition:all .18s;}
.btn-solid:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,75,139,.4);}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;gap:4px;}

/* ═══ HOME ═══ */
.h-greet{font-family:var(--serif);font-size:36px;font-weight:300;font-style:italic;line-height:1.2;margin-bottom:6px;}
.h-heart{color:var(--rose);display:inline-block;animation:hb 2.5s ease-in-out infinite;filter:drop-shadow(0 0 8px rgba(255,75,139,.7));}
.conn-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin:8px 0 5px;}
.conn-fill{height:100%;border-radius:3px;transition:width 2.5s cubic-bezier(.23,1,.32,1);}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.stat-c{background:var(--glass);border:.5px solid var(--gb);border-radius:14px;padding:12px 10px;text-align:center;}
.stat-n{font-size:20px;font-weight:500;color:var(--rose);}
.stat-l{font-size:9px;color:var(--tdd);text-transform:uppercase;letter-spacing:1.2px;margin-top:2px;}
.mood-row{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;}
.mood-row::-webkit-scrollbar{display:none}
.mood-btn{width:42px;height:42px;border-radius:50%;border:.5px solid var(--gb);background:none;font-size:20px;cursor:pointer;transition:all .18s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mood-btn:hover,.mood-btn.sel{background:rgba(255,75,139,.15);border-color:rgba(255,75,139,.4);transform:scale(1.15);}
.qnav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px;}
.qb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;background:var(--glass);border:.5px solid var(--gb);border-radius:12px;cursor:pointer;font-family:var(--sans);transition:all .18s;border:none;}
.qb:hover{background:var(--rose-d);border:.5px solid var(--rose-b);transform:translateY(-2px);}
.motd{border:.5px solid rgba(255,75,139,.22);border-radius:18px;overflow:hidden;margin-bottom:18px;cursor:pointer;transition:all .2s;position:relative;}
.motd:hover{transform:scale(1.01);border-color:rgba(255,75,139,.4);}
.motd img,.motd-ph{width:100%;height:160px;object-fit:cover;display:block;}
.motd-ph{background:linear-gradient(135deg,#2D1040,#6B1A3A,#2D0A2A);display:flex;align-items:center;justify-content:center;font-size:44px;}
.otd-banner{background:linear-gradient(135deg,rgba(244,161,22,.1),rgba(255,75,139,.08));border:.5px solid rgba(244,161,22,.3);border-radius:14px;padding:12px 16px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.miss-popup{position:fixed;top:80px;right:24px;background:rgba(13,6,18,.95);border:.5px solid rgba(255,75,139,.35);border-radius:16px;padding:16px 20px;z-index:100;max-width:260px;animation:slideRight .4s ease;backdrop-filter:blur(14px);}
.miss-popup-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--tdd);cursor:pointer;font-size:14px;}

/* ═══ LOVE NOTES ═══ */
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.note-card{border-radius:14px;padding:16px;cursor:pointer;position:relative;transition:transform .18s;min-height:120px;display:flex;flex-direction:column;}
.note-card:hover{transform:rotate(-1deg) scale(1.02);}
.note-txt{font-family:var(--serif);font-size:15px;font-style:italic;line-height:1.6;flex:1;word-break:break-word;}
.note-ts{font-size:10px;opacity:.6;margin-top:8px;}
.note-add{border:1.5px dashed rgba(255,75,139,.3);border-radius:14px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;transition:all .2s;}
.note-add:hover{border-color:rgba(255,75,139,.6);background:rgba(255,75,139,.04);}
.note-colors{display:flex;gap:8px;margin-top:12px;}
.nc{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .18s;border:2px solid transparent;}
.nc.sel{border-color:#fff;transform:scale(1.15);}

/* ═══ LOVE STATS ═══ */
.stats-hero{background:linear-gradient(135deg,rgba(255,75,139,.12),rgba(123,63,160,.12));border:.5px solid rgba(255,75,139,.25);border-radius:20px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}
.stats-hero::before{content:'💕';position:absolute;top:-20px;right:-10px;font-size:80px;opacity:.08;}
.stats-big{font-size:64px;font-weight:700;background:linear-gradient(135deg,var(--rose),#C23B6E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.stats-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stat-card2{background:var(--glass);border:.5px solid var(--gb);border-radius:16px;padding:18px;text-align:center;}
.stat-n2{font-size:32px;font-weight:500;color:var(--rose);display:block;}
.stat-l2{font-size:11px;color:var(--tdd);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
.love-bar{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-top:10px;}
.love-fill{height:100%;background:linear-gradient(90deg,#8B1A4A,#C23B6E,var(--rose),#F4A116);border-radius:4px;transition:width 2s ease;}
.chart-bar{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:10px;}
.cbar{flex:1;border-radius:4px 4px 0 0;transition:height .6s ease;background:linear-gradient(to top,#A82D5E,var(--rose));min-width:8px;}
.achievement{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--glass);border:.5px solid var(--gb);border-radius:14px;margin-bottom:8px;}
.achievement.unlocked{border-color:rgba(244,161,22,.4);background:rgba(244,161,22,.06);}
.ach-ic{font-size:28px;flex-shrink:0;}
.ach-locked{filter:grayscale(1);opacity:.4;}

/* ═══ COUNTDOWN ═══ */
.countdown-hero{background:linear-gradient(135deg,rgba(255,75,139,.1),rgba(123,63,160,.1));border:.5px solid rgba(255,75,139,.25);border-radius:20px;padding:32px;text-align:center;margin-bottom:24px;}
.cd-time{display:flex;justify-content:center;gap:16px;margin:20px 0;}
.cd-unit{text-align:center;}
.cd-n{font-size:48px;font-weight:300;font-family:var(--serif);color:var(--rose);line-height:1;display:block;}
.cd-l{font-size:10px;color:var(--tdd);text-transform:uppercase;letter-spacing:2px;margin-top:4px;}
.cd-sep{font-size:40px;color:rgba(255,75,139,.3);align-self:flex-start;margin-top:8px;}
.event-list{display:flex;flex-direction:column;gap:10px;}
.event-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--glass);border:.5px solid var(--gb);border-radius:14px;cursor:pointer;transition:all .18s;}
.event-item:hover{border-color:rgba(255,75,139,.25);}
.event-item.active-ev{border-color:rgba(255,75,139,.4);background:rgba(255,75,139,.06);}
.ev-ic{font-size:24px;flex-shrink:0;}
.ev-days{font-size:22px;font-weight:500;color:var(--rose);margin-left:auto;flex-shrink:0;}

/* ═══ BUCKET LIST ═══ */
.bucket-cat{margin-bottom:24px;}
.bucket-cat-t{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--tdd);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.bucket-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--glass);border:.5px solid var(--gb);border-radius:12px;margin-bottom:7px;cursor:pointer;transition:all .18s;}
.bucket-item:hover{border-color:rgba(255,75,139,.2);}
.bucket-item.done{opacity:.6;}
.bucket-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--rose-b);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.bucket-item.done .bucket-check{background:var(--rose);border-color:var(--rose);}
.bucket-txt{font-size:14px;flex:1;}
.bucket-item.done .bucket-txt{text-decoration:line-through;color:var(--tdd);}
.bucket-ic{font-size:18px;flex-shrink:0;}
.bucket-progress{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-top:4px;}
.bucket-fill{height:100%;background:linear-gradient(90deg,#A82D5E,var(--rose));border-radius:3px;transition:width .6s ease;}

/* ═══ OUR SONG ═══ */
.song-hero{background:linear-gradient(135deg,#1A0830,#2D1050,#1A0830);border-radius:20px;padding:30px;text-align:center;position:relative;overflow:hidden;margin-bottom:20px;}
.vinyl{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#222 20%,#111 20%,#111 30%,#333 30%,#333 32%,#111 32%,#111 60%,#333 60%,#333 62%,#111 62%);margin:0 auto 20px;position:relative;animation:spin 4s linear infinite;animation-play-state:var(--vinyl-play,running);}
.vinyl::after{content:'';position:absolute;inset:40%;border-radius:50%;background:radial-gradient(circle,var(--rose),#8B1A4A);}
.sound-bars{display:flex;align-items:flex-end;gap:4px;height:48px;justify-content:center;margin-top:12px;}
.sbar{width:6px;border-radius:3px;background:linear-gradient(to top,var(--rose),rgba(255,75,139,.4));transition:height .2s ease;}
.song-ctrl{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;}
.s-btn{background:rgba(255,255,255,.07);border:.5px solid var(--gb);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text);border:none;transition:all .18s;}
.s-btn:hover{background:var(--rose-d);color:var(--rose);}
.s-btn.play{width:56px;height:56px;font-size:20px;background:linear-gradient(135deg,#A82D5E,var(--rose));}
.progress-wrap{margin:12px 0;position:relative;}
.progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;}
.progress-fill{height:100%;background:var(--rose);border-radius:2px;transition:width .3s linear;}
.playlist{background:var(--glass);border:.5px solid var(--gb);border-radius:16px;padding:8px;}
.pl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all .16s;}
.pl-item:hover{background:rgba(255,255,255,.04);}
.pl-item.playing{background:var(--rose-d);}
.pl-num{width:20px;text-align:center;font-size:12px;color:var(--tdd);}
.pl-info{flex:1;}

/* ═══ DATE IDEAS ═══ */
.wheel-wrap{position:relative;width:280px;height:280px;margin:0 auto 24px;}
.wheel{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden;cursor:pointer;}
.wheel-seg{position:absolute;width:50%;height:50%;transform-origin:100% 100%;}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:28px;z-index:10;}
.idea-result{background:linear-gradient(135deg,rgba(255,75,139,.1),rgba(123,63,160,.1));border:.5px solid rgba(255,75,139,.28);border-radius:18px;padding:24px;text-align:center;margin-bottom:20px;}

/* ═══ LOVE QUIZ ═══ */
.quiz-card{background:var(--glass);border:.5px solid var(--gb);border-radius:18px;padding:28px;text-align:center;}
.quiz-progress{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:24px;overflow:hidden;}
.quiz-prog-fill{height:100%;background:linear-gradient(90deg,#A82D5E,var(--rose));border-radius:2px;transition:width .4s ease;}
.quiz-q{font-family:var(--serif);font-size:22px;font-weight:300;margin-bottom:24px;line-height:1.4;}
.quiz-opts{display:flex;flex-direction:column;gap:10px;}
.quiz-opt{padding:13px 18px;background:rgba(255,255,255,.04);border:.5px solid var(--gb);border-radius:12px;cursor:pointer;font-size:14px;text-align:left;transition:all .18s;font-family:var(--sans);}
.quiz-opt:hover{border-color:rgba(255,75,139,.3);background:rgba(255,75,139,.06);}
.quiz-opt.correct{border-color:#22C55E;background:rgba(34,197,94,.1);color:#22C55E;}
.quiz-opt.wrong{border-color:#EF4444;background:rgba(239,68,68,.1);color:#EF4444;}
.quiz-score{font-size:60px;font-family:var(--serif);color:var(--rose);margin-bottom:8px;}

/* ═══ VAULT ═══ */
.vault-page{display:flex;flex-direction:column;height:100vh;}
.vault-hdr{padding:18px 22px 12px;border-bottom:.5px solid var(--gb);flex-shrink:0;background:rgba(14,7,19,.8);backdrop-filter:blur(14px);}
.vault-acts{display:flex;gap:7px;padding:9px 22px;border-bottom:.5px solid var(--gb);flex-shrink:0;flex-wrap:wrap;}
.vact{display:flex;align-items:center;gap:5px;padding:6px 13px;background:var(--glass);border:.5px solid var(--gb);border-radius:22px;font-size:12px;color:var(--td);cursor:pointer;font-family:var(--sans);border:none;white-space:nowrap;transition:all .16s;}
.vact:hover,.vact.sp{background:var(--rose-d);color:var(--rose);border:.5px solid var(--rose-b);}
.vault-filters{display:flex;gap:7px;overflow-x:auto;margin-top:10px;}
.vault-filters::-webkit-scrollbar{display:none}
.vf{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--gb);background:none;color:var(--td);font-family:var(--sans);white-space:nowrap;flex-shrink:0;transition:all .16s;}
.vf.on{background:var(--rose);border-color:var(--rose);color:#fff;}
.vault-search{flex:1;background:rgba(255,255,255,.05);border:.5px solid var(--gb);border-radius:20px;padding:7px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .2s;}
.vault-search:focus{border-color:rgba(255,75,139,.4);}
.vault-grid-wrap{flex:1;overflow-y:auto;padding:12px 16px;}
.vault-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.photo-cell{aspect-ratio:1;border-radius:9px;overflow:hidden;position:relative;cursor:pointer;background:rgba(255,255,255,.04);transition:transform .15s;}
.photo-cell:hover{transform:scale(1.03);z-index:2;}
.photo-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s;}
.ph-ov{position:absolute;inset:0;background:transparent;transition:background .2s;}
.photo-cell:hover .ph-ov{background:rgba(0,0,0,.22);}
.ph-fav{position:absolute;top:5px;right:6px;font-size:11px;}
.ph-new{position:absolute;top:5px;left:6px;background:var(--rose);border-radius:6px;font-size:9px;padding:2px 5px;color:#fff;font-weight:500;}
.ph-sel{position:absolute;top:5px;left:6px;width:18px;height:18px;border-radius:50%;border:2px solid #fff;background:none;transition:all .15s;}
.ph-sel.checked{background:var(--rose);border-color:var(--rose);}
.ph-heart{position:absolute;bottom:5px;right:6px;font-size:12px;opacity:0;transition:opacity .2s;}
.photo-cell:hover .ph-heart{opacity:1;}
.photo-ph{width:100%;height:100%;background:linear-gradient(135deg,rgba(255,75,139,.06),rgba(123,63,160,.06));display:flex;align-items:center;justify-content:center;font-size:22px;}
.drop-zone{border:1.5px dashed rgba(255,75,139,.3);border-radius:18px;padding:40px 30px;text-align:center;cursor:pointer;transition:all .2s;width:100%;max-width:480px;}
.drop-zone:hover,.drop-zone.drag{border-color:rgba(255,75,139,.55);background:rgba(255,75,139,.04);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.cat-card{aspect-ratio:1.2;border-radius:13px;overflow:hidden;position:relative;cursor:pointer;transition:transform .2s;}
.cat-card:hover{transform:scale(1.03);}
.cat-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.cat-ov{position:absolute;bottom:0;left:0;right:0;padding:9px 11px;background:linear-gradient(transparent,rgba(0,0,0,.72));}
.month-div{padding:8px 0 6px;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--tdd);display:flex;align-items:center;gap:10px;}
.month-div::after{content:'';flex:1;height:.5px;background:var(--gb);}
.bulk-bar{position:sticky;bottom:0;background:rgba(13,6,18,.95);border-top:.5px solid var(--gb);padding:12px 16px;display:flex;gap:10px;align-items:center;backdrop-filter:blur(14px);}

/* ═══ PHOTO MODAL ═══ */
.pm{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;animation:fadeIn .2s ease;}
.pm-bg{position:absolute;inset:0;background:rgba(9,5,14,.96);}
.pm-close{position:absolute;top:16px;right:16px;z-index:10;background:rgba(255,255,255,.08);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;color:var(--text);cursor:pointer;}
.pm-img-wrap{position:relative;z-index:5;flex:1;display:flex;align-items:center;justify-content:center;padding:56px 18px 0;}
.pm-img{max-width:100%;max-height:calc(100vh - 260px);border-radius:14px;object-fit:contain;}
.pm-foot{position:relative;z-index:5;padding:14px 22px 20px;}
.pm-date{font-size:10px;color:var(--tdd);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.pm-cap{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--td);margin-bottom:12px;line-height:1.5;cursor:pointer;}
.pm-rxns{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.rxn-btn{background:rgba(255,255,255,.06);border:.5px solid var(--gb);border-radius:22px;padding:6px 12px;font-size:13px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:4px;color:var(--td);}
.rxn-btn:hover,.rxn-btn.active{background:rgba(255,75,139,.18);border-color:rgba(255,75,139,.35);}
.pm-nav-row{display:flex;align-items:center;gap:10px;}
.pm-nb{background:rgba(255,255,255,.07);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--td);transition:all .18s;}
.pm-nb:hover{background:var(--rose-d);color:var(--rose);}
.pm-pos{font-size:12px;color:var(--tdd);flex:1;text-align:center;}
.cap-inp{width:100%;background:rgba(255,255,255,.05);border:.5px solid rgba(255,75,139,.25);border-radius:12px;padding:9px 13px;font-size:14px;color:var(--text);font-family:var(--serif);font-style:italic;outline:none;margin-bottom:7px;}
.pm-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}

/* ═══ PIN ═══ */
.pin-wrap{position:absolute;inset:0;background:rgba(9,5,14,.98);backdrop-filter:blur(30px);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;}
.pin-dots{display:flex;gap:14px;margin:28px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,75,139,.4);transition:all .2s;}
.pin-dot.filled{background:var(--rose);border-color:var(--rose);box-shadow:0 0 12px rgba(255,75,139,.6);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
.pin-key{height:64px;background:rgba(255,255,255,.05);border:.5px solid var(--gb);border-radius:16px;font-size:22px;color:var(--text);cursor:pointer;transition:all .14s;font-family:var(--sans);display:flex;align-items:center;justify-content:center;}
.pin-key:hover{background:rgba(255,75,139,.12);}
.pin-key:active{transform:scale(.93);}

/* ═══ SLIDESHOW ═══ */
.ss{position:fixed;inset:0;z-index:300;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ss img{max-width:90vw;max-height:72vh;border-radius:14px;object-fit:contain;animation:fadeIn .5s ease;}
.ss-ctrl{position:absolute;bottom:28px;left:0;right:0;display:flex;justify-content:center;gap:14px;align-items:center;}
.ss-btn{background:rgba(255,255,255,.12);border:none;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;}
.ss-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;border-radius:50%;width:40px;height:40px;font-size:18px;color:#fff;cursor:pointer;}

/* ═══ NIGHT ═══ */
.n-msg{background:rgba(255,255,255,.027);border:.5px solid rgba(255,255,255,.055);border-radius:14px;padding:18px;margin-bottom:14px;font-family:var(--serif);font-size:17px;font-weight:300;line-height:1.75;}
.n-ts{font-size:10px;color:var(--tdd);margin-top:10px;font-family:var(--sans);font-style:normal;}
.unsent-box{background:rgba(255,75,139,.05);border:.5px solid rgba(255,75,139,.15);border-radius:14px;padding:16px;margin-bottom:14px;}
.breathe-circle{width:120px;height:120px;border-radius:50%;border:2px solid rgba(255,75,139,.3);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--td);margin:20px auto;animation:breatheCircle 4s ease-in-out infinite;cursor:pointer;transition:all .2s;}
.breathe-circle.inhale{animation-duration:4s;}
.breathe-circle.exhale{animation-duration:6s;}
.star-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star{position:absolute;width:2px;height:2px;background:var(--rose);border-radius:50%;animation:twinkle var(--dur,2s) ease-in-out infinite;animation-delay:var(--delay,0s);}

/* ═══ LETTERS ═══ */
.tabs{display:flex;background:rgba(255,255,255,.04);border:.5px solid var(--gb);border-radius:24px;padding:3px;width:fit-content;margin-bottom:18px;}
.tab-b{padding:7px 15px;border-radius:22px;font-size:13px;cursor:pointer;color:var(--td);border:none;background:none;font-family:var(--sans);transition:all .18s;}
.tab-b.on{background:var(--rose);color:#fff;font-weight:500;}
.ltr-item{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-radius:12px;cursor:pointer;transition:background .16s;}
.ltr-item:hover{background:var(--glass);}
.ltr-write{background:rgba(255,75,139,.04);border:.5px solid rgba(255,75,139,.2);border-radius:16px;padding:22px;}
.letter-paper{background:rgba(255,255,255,.03);border-radius:12px;padding:20px;min-height:200px;font-family:var(--serif);font-size:16px;line-height:2;color:var(--text);outline:none;width:100%;resize:none;border:none;}
.letter-lines{background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(255,75,139,.08) 31px,rgba(255,75,139,.08) 32px);}

/* ═══ WEEKLY ═══ */
.q-card{padding:14px 17px;margin-bottom:8px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;border-radius:13px;background:var(--glass);border:.5px solid var(--gb);transition:all .16s;}
.q-card:hover{border-color:rgba(255,75,139,.2);}
.week-streak{display:flex;gap:6px;margin-bottom:16px;}
.ws-day{width:32px;height:32px;border-radius:8px;background:var(--glass);border:.5px solid var(--gb);display:flex;align-items:center;justify-content:center;font-size:12px;}
.ws-day.done{background:rgba(255,75,139,.15);border-color:rgba(255,75,139,.35);}

/* ═══ JOURNEY ═══ */
.tl{position:relative;padding-left:20px;margin-top:8px;}
.tl::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--rose),rgba(255,75,139,.05));}
.tl-item{position:relative;padding:0 0 22px 18px;}
.tl-dot{position:absolute;left:-5px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);}
.tl-date{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:4px;}
.tl-txt{font-family:var(--serif);font-size:16px;font-weight:300;line-height:1.5;}
.milestone-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(244,161,22,.12);border:.5px solid rgba(244,161,22,.3);border-radius:10px;font-size:10px;color:#F4A116;margin-top:5px;}
.jrn-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.jstat{background:var(--glass);border:.5px solid var(--gb);border-radius:12px;padding:12px;text-align:center;}

/* ═══ MEMORY ═══ */
.mgrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mc{aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;cursor:pointer;transition:transform .18s;}
.mc:hover{transform:scale(1.04);}
.mc-ov{position:absolute;bottom:0;left:0;right:0;padding:9px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:11px;color:rgba(255,255,255,.85);}

/* ═══ ADMIN ═══ */
.sec-hdr{display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:12px;cursor:pointer;background:var(--glass);border:.5px solid var(--gb);margin-bottom:2px;user-select:none;transition:background .16s;}
.sec-hdr:hover{background:rgba(255,255,255,.06);}
.sec-body{background:rgba(255,255,255,.025);border:.5px solid var(--gb);border-top:none;border-bottom-left-radius:12px;border-bottom-right-radius:12px;padding:15px;margin-bottom:10px;}
.fld-inp{width:100%;background:rgba(255,255,255,.055);border:.5px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;line-height:1.6;transition:border-color .2s;}
.fld-inp:focus{border-color:rgba(255,75,139,.4);}
textarea.fld-inp{resize:vertical;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-radius:11px;cursor:pointer;transition:background .16s;}
.s-row:hover{background:var(--glass);}
.tog{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
.tog.on{background:var(--rose);}.tog.off{background:rgba(255,255,255,.14);}
.tog-k{position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:left .18s;}
.tog.on .tog-k{left:23px;}.tog.off .tog-k{left:3px;}

/* ═══ MISC ═══ */
.loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:30px;color:var(--tdd);font-size:13px;}
.spin-ic{width:16px;height:16px;border:1.5px solid rgba(255,75,139,.3);border-top-color:var(--rose);border-radius:50%;animation:spin 1s linear infinite;}
.secret-screen{background:linear-gradient(135deg,#0A0312,#1A0828,#0A0312);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;animation:fadeIn .8s ease;}
.secret-msg{font-family:var(--serif);font-size:28px;font-weight:300;font-style:italic;color:var(--rose);line-height:1.5;max-width:500px;filter:drop-shadow(0 0 20px rgba(255,75,139,.5));}
.quote-box{background:linear-gradient(135deg,rgba(255,75,139,.06),rgba(123,63,160,.06));border:.5px solid rgba(255,75,139,.2);border-radius:16px;padding:20px 24px;text-align:center;margin-bottom:20px;position:relative;}
.quote-box::before{content:'"';font-family:var(--serif);font-size:60px;color:rgba(255,75,139,.15);position:absolute;top:-10px;left:12px;line-height:1;}
.inactivity-msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(13,6,18,.95);border:.5px solid rgba(255,75,139,.35);border-radius:14px;padding:12px 20px;z-index:50;animation:slideUp .4s ease;backdrop-filter:blur(14px);white-space:nowrap;font-family:var(--serif);font-size:14px;font-style:italic;color:var(--rose);}
.gratitude-entry{background:var(--glass);border:.5px solid var(--gb);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:10px;}

/* ══ QUIT WEED FEATURES CSS ══ */
@keyframes countUp{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes progressGlow{0%,100%{box-shadow:0 0 8px rgba(61,214,140,.3)}50%{box-shadow:0 0 22px rgba(61,214,140,.7)}}
@keyframes breatheCircle2{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(100,180,255,.4)}50%{transform:scale(1.08);box-shadow:0 0 0 20px rgba(100,180,255,0)}}
@keyframes cravingShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes milestoneIn{from{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.15) rotate(3deg)}to{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes streakFire{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1) rotate(2deg)}}
@keyframes fillBar{from{width:0%}to{width:var(--target-w,0%)}}

/* Clean Kenza hero */
.kenza-clean-hero{background:linear-gradient(135deg,rgba(61,214,140,.1),rgba(0,180,216,.08));border:.5px solid rgba(61,214,140,.28);border-radius:22px;padding:28px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}
.kenza-clean-hero::before{content:'🌿';position:absolute;top:-10px;right:10px;font-size:80px;opacity:.07;}
.clean-days-big{font-size:72px;font-weight:700;background:linear-gradient(135deg,#3DD68C,#00B4D8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:countUp .6s ease;}
.clean-label{font-size:13px;color:rgba(61,214,140,.7);text-transform:uppercase;letter-spacing:2.5px;margin-top:6px;}
.clean-sub{font-family:var(--serif);font-size:15px;font-style:italic;color:var(--td);margin-top:12px;line-height:1.6;}

/* Milestone badges */
.milestone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.milestone-badge{border-radius:16px;padding:14px 10px;text-align:center;border:.5px solid var(--gb);transition:all .2s;cursor:default;}
.milestone-badge.unlocked{border-color:rgba(61,214,140,.4);background:rgba(61,214,140,.07);animation:milestoneIn .5s ease;}
.milestone-badge.locked{opacity:.45;filter:grayscale(.6);}
.mb-ic{font-size:28px;margin-bottom:6px;}
.mb-days{font-size:11px;color:var(--tdd);text-transform:uppercase;letter-spacing:1.5px;}
.mb-label{font-size:12px;color:var(--td);margin-top:3px;font-weight:500;}
.milestone-badge.unlocked .mb-label{color:#3DD68C;}

/* Craving SOS */
.sos-btn{background:linear-gradient(135deg,rgba(255,75,139,.18),rgba(255,75,139,.1));border:1.5px solid rgba(255,75,139,.4);border-radius:18px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.sos-btn:hover{transform:scale(1.02);border-color:rgba(255,75,139,.65);box-shadow:0 8px 28px rgba(255,75,139,.2);}
.sos-ic{font-size:38px;margin-bottom:8px;animation:streakFire 2s ease-in-out infinite;}
.sos-title{font-family:var(--serif);font-size:20px;font-style:italic;margin-bottom:4px;}
.sos-sub{font-size:12px;color:var(--tdd);}

/* Craving timer */
.craving-timer{background:rgba(255,75,139,.06);border:.5px solid rgba(255,75,139,.2);border-radius:18px;padding:24px;text-align:center;animation:fadeUp .4s ease;}
.craving-circle{width:120px;height:120px;border-radius:50%;border:3px solid rgba(255,75,139,.18);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;position:relative;animation:breatheCircle2 3s ease-in-out infinite;}
.craving-circle svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.craving-secs{font-size:34px;font-weight:300;font-family:var(--serif);color:var(--rose);}
.craving-msg{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--td);line-height:1.65;}

/* Breathe tool */
.breathe-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0;}
.breathe-circle{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(100,180,255,.2),rgba(100,180,255,.05));border:2px solid rgba(100,180,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;font-family:var(--serif);font-size:15px;font-style:italic;color:rgba(100,180,255,.9);text-align:center;padding:20px;}
.breathe-circle.inhale{animation:breatheCircle2 4s ease-in-out;}
.breathe-phase{font-size:22px;font-family:var(--serif);font-style:italic;color:rgba(100,180,255,.8);}
.breathe-count{font-size:13px;color:var(--tdd);}

/* Health timeline */
.health-tl{display:flex;flex-direction:column;gap:0;}
.htl-item{display:flex;gap:14px;padding-bottom:18px;position:relative;}
.htl-item::before{content:'';position:absolute;left:11px;top:22px;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(61,214,140,.3),transparent);}
.htl-item:last-child::before{display:none;}
.htl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid rgba(61,214,140,.3);margin-top:2px;}
.htl-dot.reached{background:rgba(61,214,140,.18);border-color:#3DD68C;animation:progressGlow 2.5s ease-in-out infinite;}
.htl-dot.future{background:rgba(255,255,255,.04);filter:grayscale(.7);opacity:.5;}
.htl-content{flex:1;}
.htl-title{font-size:14px;font-weight:500;margin-bottom:2px;}
.htl-sub{font-size:12px;color:var(--tdd);line-height:1.5;}
.htl-time{font-size:11px;color:rgba(61,214,140,.65);margin-top:3px;text-transform:uppercase;letter-spacing:1.2px;}

/* Money saved */
.money-hero{background:linear-gradient(135deg,rgba(244,161,22,.12),rgba(244,100,0,.08));border:.5px solid rgba(244,161,22,.3);border-radius:18px;padding:24px;text-align:center;margin-bottom:16px;}
.money-big{font-size:52px;font-weight:700;background:linear-gradient(135deg,#F4A116,#EF6C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.money-sub{font-size:13px;color:rgba(244,161,22,.7);margin-top:4px;}
.money-dream-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.money-dream{background:var(--glass);border:.5px solid var(--gb);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;}
.money-dream:hover{border-color:rgba(244,161,22,.3);}
.money-dream.achieved{border-color:rgba(61,214,140,.4);background:rgba(61,214,140,.06);}
.md-ic{font-size:26px;margin-bottom:6px;}
.md-label{font-size:12px;color:var(--td);}
.md-cost{font-size:11px;color:var(--tdd);margin-top:2px;}

/* Daily challenge */
.challenge-card{background:linear-gradient(135deg,rgba(168,45,94,.1),rgba(83,52,131,.1));border:.5px solid rgba(255,75,139,.2);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.challenge-card::after{content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(rgba(255,75,139,.08),transparent);}
.ch-day{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--rose);margin-bottom:6px;}
.ch-title{font-family:var(--serif);font-size:18px;font-style:italic;margin-bottom:8px;}
.ch-desc{font-size:13px;color:var(--td);line-height:1.6;}
.ch-done-btn{margin-top:14px;width:100%;padding:11px;background:rgba(61,214,140,.12);border:.5px solid rgba(61,214,140,.28);border-radius:12px;color:#3DD68C;font-size:14px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.ch-done-btn:hover{background:rgba(61,214,140,.22);}
.ch-done-btn.done{background:rgba(61,214,140,.18);color:#3DD68C;}

/* Support msg */
.support-msg{background:linear-gradient(135deg,rgba(255,75,139,.07),rgba(83,52,131,.07));border:.5px solid rgba(255,75,139,.18);border-radius:16px;padding:18px 20px;margin-bottom:12px;}
.sm-from{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--rose);margin-bottom:6px;}
.sm-txt{font-family:var(--serif);font-size:16px;font-style:italic;line-height:1.7;color:var(--text);}
.sm-time{font-size:10px;color:var(--tdd);margin-top:8px;}

/* Progress ring */
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;margin:16px 0;}

/* ── FEATURE CSS ── */
@keyframes orbit{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg)}to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg)}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes breathePulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}
@keyframes waveBar{0%,100%{height:4px}50%{height:100%}}
@keyframes filmFlicker{0%,100%{opacity:1}92%{opacity:.95}95%{opacity:.7}97%{opacity:1}}
@keyframes heartRing{0%{transform:scale(1);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes aurora{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-8px) rotate(5deg)}50%{transform:translate(-5px,12px) rotate(-3deg)}75%{transform:translate(-12px,-4px) rotate(4deg)}100%{transform:translate(0,0) rotate(0deg)}}
@keyframes scanline{0%{top:-10%}100%{top:110%}}
.feature-canvas{border-radius:20px;display:block;width:100%;cursor:pointer;}
.film-frame{background:#0A0510;border-radius:20px;overflow:hidden;position:relative;border:.5px solid rgba(255,75,139,.15);box-shadow:0 0 60px rgba(75,0,130,.12);}
.film-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:18px;background:rgba(0,0,0,.8);z-index:2;}
.film-frame::after{content:'';position:absolute;bottom:0;left:0;right:0;height:18px;background:rgba(0,0,0,.8);z-index:2;}
.film-scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(transparent,rgba(255,255,255,.03),transparent);animation:scanline 4s linear infinite;pointer-events:none;z-index:3;}
.whisper-wave{display:flex;align-items:center;gap:2px;height:32px;padding:0 8px;}
.whisper-wave-bar{background:rgba(255,75,139,.5);border-radius:2px;width:3px;animation:waveBar 1.2s ease-in-out infinite;}
.love-clock-ring{position:absolute;border-radius:50%;border:2px solid transparent;}


/* ═══════════════════════════════

/* Safe area insets for notch + home indicator */
:root {
  --sat: env(safe-area-inset-top, 0px);
  --sar: env(safe-area-inset-right, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
}

/* PWA standalone mode - fill entire screen */
@media all and (display-mode: standalone) {
  html, body, #root { height: 100%; overflow: hidden; }
  .app { padding-top: var(--sat); }
  .sb { padding-top: calc(var(--sat) + 10px); }
  .mob-ham { top: calc(var(--sat) + 12px) !important; }
  .content { padding-bottom: var(--sab); }
}

/* ── HAMBURGER BUTTON ── */
.mob-ham {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 500;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: rgba(255,75,139,.15);
  border: .5px solid rgba(255,75,139,.35);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  color: var(--rose);
  transition: all .2s;
  -webkit-touch-callout: none;
  user-select: none;
}
.mob-ham:active { transform: scale(.92); background: rgba(255,75,139,.3); }

/* ── SIDEBAR OVERLAY ── */
.sb-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 399;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  animation: fadeIn .25s ease;
}

/* ── MOBILE LAYOUT ── */
@media (max-width: 768px) {
  /* Show hamburger */
  .mob-ham { display: flex !important; }

  /* Sidebar: slide from left */
  .sb {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    bottom: 0 !important;
    height: 100% !important;
    height: -webkit-fill-available !important;
    z-index: 400 !important;
    transform: translateX(-105%) !important;
    transition: transform .32s cubic-bezier(.4,0,.2,1), box-shadow .32s !important;
    box-shadow: none !important;
    width: 82vw !important;
    max-width: 300px !important;
    will-change: transform;
    -webkit-overflow-scrolling: touch;
  }
  .sb.sb-open {
    transform: translateX(0) !important;
    box-shadow: 8px 0 40px rgba(0,0,0,.7) !important;
  }
  .sb-overlay.sb-open { display: block !important; }

  /* Content: full width */
  .content {
    width: 100% !important;
    padding-top: 0 !important;
    -webkit-overflow-scrolling: touch;
    overflow-y: auto;
  }

  /* Page padding for hamburger button */
  .page {
    padding: 64px 18px 40px !important;
    -webkit-overflow-scrolling: touch;
  }

  /* Vault page special */
  .vault-page { height: 100dvh !important; }
  .vault-hdr { padding-top: 58px !important; }

  /* Grids adapt for iPhone */
  .vault-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 4px !important; }
  .notes-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .qnav { grid-template-columns: repeat(5, 1fr) !important; gap: 6px !important; }
  .mgrid3 { grid-template-columns: repeat(2, 1fr) !important; }
  .cat-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .stats-grid2 { grid-template-columns: 1fr !important; }
  .jrn-stats { grid-template-columns: repeat(3, 1fr) !important; }
  .cd-n { font-size: 38px !important; }
  .stats-big { font-size: 52px !important; }
  .h-greet { font-size: 28px !important; }
  .pg-t { font-size: 24px !important; }

  /* Photo modal full screen on iPhone */
  .pm { padding: 0 !important; }
  .pm-img { max-height: calc(100dvh - 280px) !important; }
  .pm-foot { padding-bottom: calc(20px + var(--sab)) !important; }

  /* Bigger tap targets for iPhone */
  .ni { padding: 12px 14px !important; font-size: 14px !important; min-height: 48px; }
  .pin-key { height: 72px !important; font-size: 24px !important; }

  .btn-r, .btn-solid { min-height: 44px; }

  /* Bottom nav area */
  .sb-bot { padding-bottom: calc(12px + var(--sab)) !important; }

  /* Slideshow full screen */
  .ss img { max-height: calc(100dvh - 160px) !important; }

  /* Hide non-essential on small screens */
  .sb-section { font-size: 8px !important; }
}

/* ── INSTALL BANNER ── */
#pwa-install-banner {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(9,5,14,.97);
  border-top: .5px solid rgba(255,75,139,.35);
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  z-index: 600;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  animation: slideUp .4s ease;
}

.pwa-banner-close { background: none; border: none; color: var(--tdd); font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }

/* ── SMOOTH SCROLLING EVERYWHERE ── */
* { -webkit-overflow-scrolling: touch; }
.content, .vault-grid-wrap, .sb-nav {
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

/* ── PERFORMANCE: GPU composite layers ── */
.sb, .pm, .ss, #boot {
  will-change: transform;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
}

/* ── PREVENT TEXT SELECT ON TAP ── */
.ni, .qb, .mood-btn, .pin-key, .bucket-item, .note-card {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── BETTER FOCUS STATES FOR ACCESSIBILITY ── */
button:focus-visible, input:focus-visible {
  outline: 2px solid var(--rose);
  outline-offset: 2px;
}

/* ── DYNAMIC VIEWPORT HEIGHT (iPhone notch fix) ── */
.vault-page, .pin-wrap, .ss {
  height: 100dvh;
  height: -webkit-fill-available;
}


/* ═══ PERFORMANCE OPTIMIZATIONS ═══ */
/* GPU acceleration for smooth 60fps on iPhone */
.sb, .content, .pm, .ss, .vault-page {
  -webkit-transform: translate3d(0,0,0);
  transform: translate3d(0,0,0);
}

/* Smooth 60fps animations */
.ni, .qb, .btn-r, .btn-solid, .photo-cell, .note-card, .bucket-item {
  transition: transform .15s ease, opacity .15s ease, border-color .2s ease;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

/* Remove hover on touch devices (prevents sticky hover) */
@media (hover: none) {
  .ni:hover, .qb:hover, .btn-r:hover, .gc:hover {
    transform: none !important;
    box-shadow: none !important;
  }
  .ni:active { background: rgba(255,75,139,.12) !important; transform: scale(.97) !important; }
  .qb:active { transform: scale(.94) !important; }
  .btn-r:active { transform: scale(.96) !important; }
  .btn-solid:active { transform: scale(.96) !important; }
}

/* Smooth image rendering */
img {
  image-rendering: -webkit-optimize-contrast;
  -webkit-transform: translateZ(0);
}

/* Disable animation if user prefers */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}

/* iPhone 12 Pro Max - adjust font sizes for 3x display */
@media (-webkit-device-pixel-ratio: 3) {
  .pg-t { -webkit-font-smoothing: antialiased; }
  body { -webkit-font-smoothing: antialiased; }
}

/* Body when PWA installed */
body.is-pwa { overscroll-behavior: none; }

/* Smooth scrolling content areas */
.content, #sb-nav, .vault-grid-wrap, .msgs-list {
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

  background:var(--rose);color:#fff;
  font-size:9px;font-weight:700;
  border-radius:9px;padding:2px 5px;
  min-width:16px;text-align:center;
  box-shadow:0 0 8px rgba(255,75,139,.6);
  border:1.5px solid rgba(9,5,14,.8);
}

/* ── HAPTIC RIPPLE ON TAP ── */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,75,139,.25);
  transform:scale(0);animation:ripple .6s linear;
  pointer-events:none;
}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* ── SKELETON LOADING ── */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,75,139,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.8s ease infinite;
  border-radius:10px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SPRING ANIMATION ── */
@keyframes spring{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.06)}80%{transform:scale(.97)}100%{transform:scale(1);opacity:1}}
.spring-in{animation:spring .45s cubic-bezier(.34,1.56,.64,1) forwards;}

/* ── iOS-STYLE CONTEXT MENU ── */
.ctx-menu{
  position:fixed;z-index:600;
  background:rgba(22,14,36,.98);
  border:.5px solid rgba(255,75,139,.2);
  border-radius:16px;padding:6px;
  min-width:180px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:spring .25s ease;
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
}
.ctx-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--td);transition:background .15s;}
.ctx-item:hover,.ctx-item:active{background:rgba(255,75,139,.1);color:var(--text);}
.ctx-item.danger{color:rgba(255,80,80,.8);}
.ctx-sep{height:.5px;background:var(--gb);margin:4px 0;}

/* ── SMOOTH PAGE TRANSITIONS ── */
.page-enter{animation:fadeUp .28s cubic-bezier(.4,0,.2,1);}

/* ── LETTER SPECIFIC ── */
.letter-reading{
  background:rgba(255,255,255,.025);
  border:.5px solid rgba(255,75,139,.12);
  border-radius:18px;padding:28px 24px;
  margin-top:10px;
}
.letter-reading p{margin-bottom:18px;font-family:var(--serif);font-size:17px;font-weight:300;line-height:1.9;color:var(--text);}
.letter-sig{color:var(--rose);font-style:italic;font-size:16px;margin-top:24px;}

.empty-state{

}
.empty-state-ic{font-size:56px;animation:float 4s ease-in-out infinite;}

.empty-state-s{font-size:13px;color:var(--tdd);line-height:1.6;max-width:260px;}

};

function getTime(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
function getGreet(g,name){const h=new Date().getHours();const base=h<5?g.n:h<12?g.m:h<17?g.a:h<21?g.e:g.ni;return base;}
function daysAgo(dateStr){
  if(dateStr==='Today')return 0;
  const d=new Date(dateStr);if(isNaN(d))return 0;
  return Math.floor((new Date()-d)/(1000*60*60*24));
}
function daysUntil(dateStr){
  const target=new Date(dateStr);const now=new Date();
  target.setFullYear(now.getFullYear());
  if(target<now)target.setFullYear(now.getFullYear()+1);
  return Math.ceil((target-now)/(1000*60*60*24));
}
function daysTogether(anniversaryDate){
  const start=new Date(anniversaryDate);const now=new Date();
  return Math.max(0,Math.floor((now-start)/(1000*60*60*24)));
}
function formatCountdown(ms){
  const s=Math.floor(ms/1000);const m=Math.floor(s/60);const h=Math.floor(m/60);const d=Math.floor(h/24);
  return{d,h:h%24,m:m%60,s:s%60};
}

function LazyPhoto({photo,onClick,selectMode,selected,onSelect}){
  const ref=useRef();const[vis,setV]=useState(false);const[loaded,setL]=useState(false);
  useEffect(()=>{const ob=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);ob.disconnect();}},{rootMargin:'200px'});if(ref.current)ob.observe(ref.current);return()=>ob.disconnect();},[]);
  const handleClick=e=>{if(selectMode){e.stopPropagation();onSelect(photo.id);}else onClick(photo);};
  return(
    <div ref={ref} className="photo-cell" onClick={handleClick}>
      {vis?(<><img src={photo.url} style={{opacity:loaded?1:0}} onLoad={()=>setL(true)} alt=""/>
        {selectMode&&<div className={`ph-sel ${selected?'checked':''}`}>{selected?'✓':''}</div>}
        {!selectMode&&photo.favourite&&<div className="ph-fav">🌸</div>}
        {!selectMode&&photo.isNew&&<div className="ph-new">NEW</div>}
        <div className="ph-ov"/><div className="ph-heart">💕</div>
      </>):<div className="photo-ph">🌸</div>}
    </div>
  );
}

function PinScreen({storageKey,sessionKey,isNew:initNew,onUnlock}){
  const[pin,setPin]=useState('');const[conf,setConf]=useState('');const[step,setStep]=useState(0);const[shake,setShake]=useState(false);
  const press=k=>{
    const np=pin+k;setPin(np);if(np.length<4)return;
    if(initNew){
      if(step===0){setConf(np);setPin('');setStep(1);}
      else{if(np===conf){localStorage.setItem(storageKey,np);sessionStorage.setItem(sessionKey,'1');onUnlock();}else{setShake(true);setPin('');setTimeout(()=>{setShake(false);setStep(0);setConf('');},450);}}
    }else{
      if(np===localStorage.getItem(storageKey)){sessionStorage.setItem(sessionKey,'1');onUnlock();}
      else{setShake(true);setTimeout(()=>{setShake(false);setPin('');},450);}
    }
  };
  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return(
    <div className="pin-wrap">
      <div style={{fontSize:52,marginBottom:14,animation:'float 3s ease-in-out infinite',filter:'drop-shadow(0 0 20px rgba(255,75,139,.6))'}}>🔐</div>
      <div style={{fontFamily:'var(--serif)',fontSize:28,fontStyle:'italic',marginBottom:5}}>{initNew?(step===0?'Create PIN':'Confirm PIN'):'Private Space'}</div>
      <div style={{fontSize:13,color:'var(--tdd)',fontStyle:'italic'}}>{initNew?(step===0?'Choose a 4-digit code':'Enter it again'):'Enter your PIN'}</div>
      <div className="pin-dots" style={shake?{animation:'pinShake .4s ease'}:{}}>
        {[0,1,2,3].map(i=><div key={i} className={'pin-dot'+(pin.length>i?' filled':'')}/>)}
      </div>
      <div className="pin-grid">
        {keys.map((k,i)=>k===''?<div key={i}/>:<button key={i} className="pin-key" onClick={()=>k==='⌫'?setPin(p=>p.slice(0,-1)):press(k)}>{k}</button>)}
      </div>
      <div style={{fontSize:11,color:'var(--tdd)',marginTop:20,fontStyle:'italic'}}>Your photos stay private, always 🔒</div>
    </div>
  );
}

            'hpr_parallel_memories','hpr_capsules'].indexOf(k)!==-1){needsRefresh=true;}
      });
      if(needsRefresh)setCloudTick(t=>t+1);
    };
    return function(){clearInterval(t);};
  },[]);

  if(!her)return null;

  return(
    <div style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,75,139,.06)',border:'.5px solid rgba(255,75,139,.15)',borderRadius:20,padding:'6px 14px',marginBottom:14,justifyContent:'center'}}>

        }
      </span>
      {her.online&&<span style={{fontSize:10,animation:'float 2s ease-in-out infinite'}}>💕</span>}
    </div>
  );
}

function LoveNotesScreen(){
  const[notes,setNotes]=useState(()=>ls.get(KEYS.notes)||DEF_NOTES);

  function save(n){setNotes(n);ls.set(KEYS.notes,n);}
  function addNote(){if(!newTxt.trim())return;const n={id:Date.now(),txt:newTxt,colorIdx:newColor,pinned:false,ts:new Date().toLocaleDateString()};save([n,...notes]);setNewTxt('');setAdding(false);}
  function delNote(id){save(notes.filter(n=>n.id!==id));}
  function pinNote(id){save(notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));}
  const sorted=[...notes.filter(n=>n.pinned),...notes.filter(n=>!n.pinned)];

  return(
    <div className="page">

      )}

      <div className="notes-grid">
        {sorted.map(n=>{
          const c=NOTE_COLORS[n.colorIdx||0]||NOTE_COLORS[0];
          return(
            <div key={n.id} className="note-card" style={{background:c.bg,border:`.5px solid ${c.accent}`}}>
              {n.pinned&&<div style={{position:'absolute',top:8,right:10,fontSize:12}}>📌</div>}
              <div className="note-txt">{n.txt}</div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10}}>
                <div className="note-ts">{n.ts}</div>
                <div style={{marginLeft:'auto',display:'flex',gap:5}}>
                  <button onClick={()=>pinNote(n.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,opacity:.7}}>{n.pinned?'📌':'📍'}</button>
                  <button onClick={()=>delNote(n.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,opacity:.7}}>×</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {sorted.length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'var(--tdd)',fontFamily:'var(--serif)',fontSize:18,fontStyle:'italic'}}>No notes yet… write your first one 💕</div>}

}

function CountdownScreen(){
  const {cfg}=useCfg();
  const[events,setEvents]=useState(()=>ls.get(KEYS.events)||DEF_EVENTS);
  const[active,setActive]=useState(0);
  const[now,setNow]=useState(new Date());
  const[adding,setAdding]=useState(false);
  const[form,setForm]=useState({label:'',date:'',ic:'🎉'});
  const[confShow,setConfShow]=useState(false);
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);

  const ev=events[active];
  const targetDate=ev?new Date(ev.date):new Date();
  targetDate.setFullYear(now.getFullYear());
  if(targetDate<now)targetDate.setFullYear(now.getFullYear()+1);
  const diff=Math.max(0,targetDate-now);
  const cd=formatCountdown(diff);
  const isToday=cd.d===0&&cd.h<1;
  useEffect(()=>{if(isToday){setConfShow(true);setTimeout(()=>setConfShow(false),5000);}},[isToday]);

  function addEvent(){if(!form.label||!form.date)return;const e={id:Date.now(),...form};const ne=[...events,e];setEvents(ne);ls.set(KEYS.events,ne);setAdding(false);}
  function delEvent(id){const ne=events.filter(e=>e.id!==id);setEvents(ne);ls.set(KEYS.events,ne);if(active>=ne.length)setActive(0);}

  return(
    <div className="page">
      <div className="pg-t">Countdown ⏳</div>
      <div className="pg-s">Every second brings us closer 💕</div>
      {confShow&&<Confetti/>}

      <div className="countdown-hero">
        <div style={{fontSize:36}}>{ev?ev.ic:'💕'}</div>
        <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--rose)',marginTop:8,marginBottom:4}}>{ev?ev.label:'Choose an event'}</div>
        {isToday?(
          <div style={{fontFamily:'var(--serif)',fontSize:28,fontStyle:'italic',color:'var(--rose)',marginTop:12}}>It's today! 🎉</div>
        ):(
          <div className="cd-time">
            {[{n:cd.d,l:'Days'},{n:cd.h,l:'Hours'},{n:cd.m,l:'Min'},{n:cd.s,l:'Sec'}].map((u,i)=>(
              <React.Fragment key={u.l}>
                {i>0&&<div className="cd-sep">:</div>}
                <div className="cd-unit">
                  <span className="cd-n">{String(u.n).padStart(2,'0')}</span>
                  <div className="cd-l">{u.l}</div>
                </div>
              </React.Fragment>
            ))}
          </div>
        )}
        <div style={{fontSize:11,color:'var(--tdd)',marginTop:4}}>{ev&&new Date(ev.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:500,color:'var(--td)'}}>Your events</div>
        <button onClick={()=>setAdding(true)} className="btn-r" style={{fontSize:12,padding:'6px 13px'}}>＋ Add Event</button>
      </div>

      {adding&&(
        <div style={{background:'rgba(255,75,139,.06)',border:'.5px solid rgba(255,75,139,.28)',borderRadius:14,padding:16,marginBottom:14,animation:'fadeUp .3s ease'}}>
          {[['label','Event name…'],['date','Date (YYYY-MM-DD)'],['ic','Icon (emoji)']].map(([k,ph])=>(

/* ══════════════════════════════════════
   SCREEN: DATE IDEAS — ROULETTE
══════════════════════════════════════ */
function DateIdeasScreen(){
  const[spinning,setSpinning]=useState(false);
  const[result,setResult]=useState(null);
  const[rotation,setRotation]=useState(0);
  const[custom,setCustom]=useState(()=>ls.get('hpr_dateideas')||[]);
  const[newIdea,setNewIdea]=useState('');
  const[newEmoji,setNewEmoji]=useState('💕');
  const[showAdd,setShowAdd]=useState(false);
  const[picked,setPicked]=useState(false);
  const allIdeas=[...DATE_IDEAS,...custom.map(c=>typeof c==='string'?{label:c,ic:'💕',color:'#1A0A20'}:c)];
  const canvasRef=useRef();

  const PALETTE=['#0D0A2E','#2A0A00','#0A0A2A','#2A0808','#1A1000','#001A0A','#150A2A','#0A0A1A','#0A1020','#040D1A','#150A1E','#200A0A','#061A20','#200800','#080820','#1A0A10','#1A0800','#0A1A10','#100A1A','#08082A'];

  useEffect(()=>{drawWheel(rotation);},[allIdeas, rotation]);

  function drawWheel(rot){
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=300,H=300,cx=W/2,cy=H/2,r=W/2-4;
    ctx.clearRect(0,0,W,H);
    const seg=2*Math.PI/allIdeas.length;
    allIdeas.forEach((idea,i)=>{
      const startA=rot*(Math.PI/180)+seg*i;
      const endA=startA+seg;
      // Slice
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,startA,endA);
      ctx.closePath();
      ctx.fillStyle=PALETTE[i%PALETTE.length];
      ctx.fill();
      ctx.strokeStyle='rgba(255,75,139,.2)';
      ctx.lineWidth=1;
      ctx.stroke();
      // Emoji
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(startA+seg/2);
      ctx.textAlign='right';
      ctx.font='18px serif';
      ctx.fillText(idea.ic,r-12,6);
      ctx.restore();
    });
    // Outer ring
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.strokeStyle='rgba(255,75,139,.5)';
    ctx.lineWidth=3;
    ctx.stroke();
    // Center circle
    ctx.beginPath();
    ctx.arc(cx,cy,26,0,2*Math.PI);
    ctx.fillStyle='#09050E';
    ctx.fill();
    ctx.strokeStyle='var(#FF4B8B)';
    ctx.strokeStyle='#FF4B8B';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.font='bold 11px sans-serif';
    ctx.fillStyle='#FF4B8B';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('💕',cx,cy);
  }

  function spin(){
    if(spinning||allIdeas.length===0)return;
    setSpinning(true);setResult(null);setPicked(false);
    const extraSpins=8+Math.floor(Math.random()*6);
    const extra=Math.floor(Math.random()*360);
    const totalDeg=extraSpins*360+extra;
    const finalRot=(rotation+totalDeg)%360;
    
    // Animate
    const duration=4000;
    const start=performance.now();
    const startRot=rotation;
    
    function animate(now){
      const elapsed=now-start;
      const t=Math.min(elapsed/duration,1);
      // Ease out cubic
      const ease=1-Math.pow(1-t,3);
      const currentRot=startRot+totalDeg*ease;
      drawWheel(currentRot*(Math.PI/180));
      if(t<1){requestAnimationFrame(animate);}
      else{
        setRotation(finalRot);
        // Find which segment is at top (270 degrees = top)
        const segSize=360/allIdeas.length;
        const normalized=(360-finalRot%360+270)%360;
        const idx=Math.floor(normalized/segSize)%allIdeas.length;
        setResult(allIdeas[idx]);
        setSpinning(false);
        setPicked(true);
      }
    }
    requestAnimationFrame(animate);
  }

  function addIdea(){
    if(!newIdea.trim())return;
    const nc=[...custom,{label:newIdea.trim(),ic:newEmoji,color:PALETTE[custom.length%PALETTE.length]}];
    setCustom(nc);ls.set('hpr_dateideas',nc);setNewIdea('');setShowAdd(false);
  }

  function removeCustom(i){
    const nc=custom.filter((_,j)=>j!==i);
    setCustom(nc);ls.set('hpr_dateideas',nc);
  }

  return(
    <div className="page" style={{maxWidth:500,paddingBottom:80}}>
      <div style={{textAlign:'center',marginBottom:16,paddingTop:4}}>
        <div style={{fontFamily:'var(--serif)',fontSize:24,fontStyle:'italic',color:'var(--text)',marginBottom:2}}>Date Ideas</div>
        <div style={{fontSize:11,color:'var(--tdd)',letterSpacing:'1.5px',textTransform:'uppercase'}}>spin to discover your next adventure</div>
      </div>

      {/* Result card */}
      {result&&picked&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,75,139,.12),rgba(244,161,22,.06))',border:'.5px solid rgba(255,75,139,.35)',borderRadius:20,padding:'20px 18px',marginBottom:18,textAlign:'center',animation:'fadeUp .4s ease'}}>
          <div style={{fontSize:52,marginBottom:10,animation:'float 2s ease-in-out infinite'}}>{result.ic}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:22,fontStyle:'italic',color:'var(--rose)',marginBottom:6}}>{result.label}</div>
          <div style={{fontSize:12,color:'var(--tdd)'}}>Your next date 💕 — make it happen</div>
        </div>
      )}

      {/* Wheel */}
      <div style={{position:'relative',width:300,height:300,margin:'0 auto 6px',display:'flex',alignItems:'center',justifyContent:'center'}}>
        {/* Pointer */}
        <div style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',fontSize:26,zIndex:10,filter:'drop-shadow(0 2px 6px rgba(255,75,139,.6))',lineHeight:1}}>▼</div>
        <canvas ref={canvasRef} width={300} height={300} onClick={spin} style={{borderRadius:'50%',cursor:spinning?'not-allowed':'pointer',boxShadow:'0 0 40px rgba(255,75,139,.15)',display:'block'}}/>
      </div>

      <button onClick={spin} disabled={spinning} style={{width:'100%',padding:'14px',background:spinning?'rgba(255,255,255,.05)':'linear-gradient(135deg,#A82D5E,#FF4B8B)',border:'none',borderRadius:14,color:'#fff',fontSize:16,cursor:spinning?'not-allowed':'pointer',fontFamily:'var(--serif)',fontStyle:'italic',marginBottom:16,opacity:spinning?.6:1,transition:'all .3s',boxShadow:spinning?'none':'0 4px 20px rgba(255,75,139,.3)'}}>
        {spinning?'Spinning… ✨':'Spin for a Date! 🎡'}
      </button>

      {/* Add idea */}
      <div style={{marginBottom:16}}>
        <button onClick={()=>setShowAdd(!showAdd)} style={{background:'transparent',border:'.5px solid rgba(255,75,139,.25)',borderRadius:20,padding:'7px 16px',color:'var(--rose)',fontSize:12,cursor:'pointer',fontFamily:'var(--sans)',marginBottom:showAdd?10:0}}>
          {showAdd?'✕ Cancel':'＋ Add your own idea'}
        </button>
        {showAdd&&(
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)} style={{width:46,background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px',fontSize:18,color:'var(--text)',outline:'none',textAlign:'center'}}/>
            <input value={newIdea} onChange={e=>setNewIdea(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addIdea()} placeholder="Your date idea..." style={{flex:1,background:'rgba(255,255,255,.055)',border:'.5px solid rgba(255,255,255,.12)',borderRadius:10,padding:'9px 12px',fontSize:13,color:'var(--text)',fontFamily:'var(--sans)',outline:'none'}}/>
            <button onClick={addIdea} style={{background:'linear-gradient(135deg,#FF4B8B,#c9357a)',border:'none',borderRadius:10,padding:'9px 14px',color:'white',fontSize:13,cursor:'pointer',fontFamily:'var(--sans)'}}>Add</button>
          </div>
        )}
      </div>

      {/* Ideas list */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {allIdeas.map((idea,i)=>(
          <div key={i} style={{padding:'5px 12px',background:'var(--glass)',border:'.5px solid var(--gb)',borderRadius:20,fontSize:12,color:'var(--td)',display:'flex',alignItems:'center',gap:5}}>
            <span>{idea.ic}</span>
            <span>{idea.label}</span>
            {i>=DATE_IDEAS.length&&<span onClick={()=>removeCustom(i-DATE_IDEAS.length)} style={{cursor:'pointer',color:'rgba(255,80,80,.4)',fontSize:10,marginLeft:2}}>✕</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   SCREEN: LOVE QUIZ
══════════════════════════════════════ */
function LoveQuizScreen(){
  const {cfg}=useCfg();
  const questions=(cfg&&cfg.quizQuestions)||DEF_CFG.quizQuestions;
  const[qi,setQi]=useState(0);const[score,setScore]=useState(0);const[selected,setSelected]=useState(null);const[done,setDone]=useState(false);const[confShow,setConfShow]=useState(false);
  const q=questions[qi];
  function select(i){
    if(selected!==null)return;
    setSelected(i);
    if(i===q.correct)setScore(s=>s+1);
    setTimeout(()=>{
      if(qi+1>=questions.length){setDone(true);if((score+1)/questions.length>=0.8)setConfShow(true);}
      else{setQi(q=>q+1);setSelected(null);}
    },1200);
  }
  function reset(){setQi(0);setScore(0);setSelected(null);setDone(false);setConfShow(false);}
  const pct=Math.round((score/questions.length)*100);

  if(done)return(
    <div className="page" style={{textAlign:'center'}}>
      {confShow&&<Confetti/>}
      <div className="pg-t">Love Quiz ❓</div>
      <div style={{marginTop:30,marginBottom:20}}>
        <div className="quiz-score">{score}/{questions.length}</div>
        <div style={{fontFamily:'var(--serif)',fontSize:20,fontStyle:'italic',color:'var(--rose)',marginBottom:8}}>{pct>=80?'Amazing! 💕':pct>=60?'Good job! ✨':'Keep learning 🌹'}</div>
        <div style={{fontSize:14,color:'var(--tdd)',marginBottom:24}}>{pct>=80?'You really know him ❤️':pct>=60?'You know him pretty well!':'There\'s more to discover…'}</div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button onClick={reset} style={{background:'linear-gradient(135deg,#A82D5E,var(--rose))',border:'none',borderRadius:12,padding:'11px 24px',color:'#fff',fontSize:14,cursor:'pointer',fontFamily:'var(--sans)'}}>Try Again 🔄</button>
        </div>
      </div>
    </div>
  );

  return(
    <div className="page">
      <div className="pg-t">Love Quiz ❓</div>
      <div className="pg-s">How well do you know him? 💕</div>
      <div className="quiz-card">
        <div className="quiz-progress"><div className="quiz-prog-fill" style={{width:`${(qi/questions.length)*100}%`}}/></div>
        <div style={{fontSize:11,color:'var(--tdd)',marginBottom:16}}>Question {qi+1} of {questions.length}</div>
        <div className="quiz-q">{q.q}</div>
        <div className="quiz-opts">
          {q.opts.map((opt,i)=>(
            <button key={i} className={`quiz-opt ${selected===i?(i===q.correct?'correct':'wrong'):(selected!==null&&i===q.correct?'correct':'')}`} onClick={()=>select(i)}>{opt}</button>
          ))}
        </div>
      </div>
    </div>
  );
}
